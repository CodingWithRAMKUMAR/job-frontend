<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Career Blog – ApplyMore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a2a;--card-bg:rgba(20,20,50,0.65);--text:#f0f3ff;--text-muted:#9ca3cf;--border:rgba(255,255,255,0.1);--accent:#3b82f6;--purple:#8b5cf6}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:1.5rem;line-height:1.5}
    .container{max-width:1400px;margin:0 auto}
    .nav-links{display:flex;justify-content:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap}
    .nav-links a{color:var(--text-muted);text-decoration:none}
    .nav-links a:hover{color:var(--accent)}
    .blog-hero{text-align:center;margin-bottom:2rem}
    .blog-hero h1{font-size:2.5rem;background:linear-gradient(135deg,var(--accent),var(--purple));background-clip:text;-webkit-background-clip:text;color:transparent}
    .blog-hero p{color:var(--text-muted);max-width:700px;margin:0 auto}
    .articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
    .article-card{background:var(--card-bg);border-radius:1rem;padding:1.2rem;border:1px solid var(--border);transition:0.2s}
    .article-card:hover{transform:translateY(-5px);border-color:var(--accent)}
    .article-category{display:inline-block;background:rgba(59,130,246,0.2);color:var(--accent);font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:1rem;margin-bottom:0.5rem}
    .article-card h3{font-size:1.2rem;margin-bottom:0.5rem}
    .article-card p{color:var(--text-muted);font-size:0.85rem;margin-bottom:0.5rem}
    .article-meta{display:flex;gap:1rem;font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem}
    .read-more{color:var(--accent);text-decoration:none;font-weight:500;font-size:0.8rem}
    footer{text-align:center;margin-top:2rem;color:var(--text-muted);font-size:0.7rem}
    @media (max-width:640px){.blog-hero h1{font-size:1.8rem}}
  </style>
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <meta property="og:image" content="https://applymore.vercel.app/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
<div class="container">
  <div class="nav-links">
    <a href="index.html">🏠 Home</a>
    <a href="about.html">📖 About</a>
    <a href="blog.html">✍️ Blog</a>
    <a href="contact.html">📧 Contact</a>
    <a href="privacy.html">🔒 Privacy</a>
    <a href="terms.html">⚖️ Terms</a>
  </div>
  <div class="blog-hero">
    <h1>IT Career Blog</h1>
    <p>Actionable advice, resume templates, interview prep, and insider tips – all for IT freshers in India.</p>
  </div>
  <div id="articlesContainer" class="articles-grid"></div>
  <footer><p>© 2026 ApplyMore — Helping IT freshers land their dream job</p></footer>
</div>
<script>
  const articles = [
    { id:1, title:"How to Find Your First IT Job in 2026: Complete Guide", category:"Job Search", excerpt:"Data-driven roadmap with skill gap analyzer, project plan, and real success stories.", readTime:"25 min", date:"Apr 10, 2026" },
    { id:2, title:"IT Fresher Resume Template: ATS-Friendly Format That Works", category:"Resume", excerpt:"Copy-paste template with 57 keywords, before/after examples, and ATS scoring tips.", readTime:"20 min", date:"Apr 8, 2026" },
    { id:3, title:"50 Most Asked Interview Questions for IT Freshers (With Answers)", category:"Interview", excerpt:"STAR-based answers, technical code snippets, and preparation plan from real transcripts.", readTime:"30 min", date:"Apr 5, 2026" },
    { id:4, title:"How to Learn Data Science in 6 Months (Free Roadmap)", category:"Skills", excerpt:"Month-by-month guide with free courses, projects, and deployment advice.", readTime:"18 min", date:"Mar 28, 2026" },
    { id:5, title:"TCS vs Infosys vs Wipro: Fresher's Comparison 2026", category:"Company", excerpt:"Salary, training, work culture, promotion timeline – data-driven comparison.", readTime:"12 min", date:"Mar 20, 2026" },
    { id:6, title:"Remote vs Office Jobs: What's Better for Freshers?", category:"Job Search", excerpt:"Survey results from 500 freshers, pros/cons, and decision framework.", readTime:"8 min", date:"Mar 15, 2026" },
    { id:7, title:"GitHub Portfolio Ideas: 10 Projects That Get You Hired", category:"Resume", excerpt:"Project tutorials, live demos, and how to present them for maximum impact.", readTime:"15 min", date:"Mar 10, 2026" }
  ];

  function renderArticles() {
    const container = document.getElementById('articlesContainer');
    if (!container) return;
    container.innerHTML = articles.map(art => `
      <div class="article-card">
        <div class="article-category">${art.category}</div>
        <h3>${escapeHtml(art.title)}</h3>
        <div class="article-meta"><span><i class="far fa-clock"></i> ${art.readTime}</span><span><i class="far fa-calendar-alt"></i> ${art.date}</span></div>
        <p>${escapeHtml(art.excerpt)}</p>
        <a href="article.html?id=${art.id}" class="read-more">Read full article →</a>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;'));
  }

  renderArticles();
</script>
</body>
</html>
