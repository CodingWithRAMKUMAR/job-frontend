      content: `<p>Landing your first IT job in 2026 is more achievable than you think – but you need a clear roadmap. This guide walks you through every stage, from learning the right skills to negotiating your offer.</p>
<h2>1. Choose the right technology stack</h2>
<p>Not all skills are equal. Based on current job market data (LinkedIn, Indeed, Naukri), the most in‑demand entry‑level skills in India for 2026 are:</p>
<ul><li><strong>Python</strong> – for backend, automation, and data roles.</li><li><strong>SQL</strong> – required for almost every IT job (data, backend, testing).</li><li><strong>Java</strong> – still huge in large enterprises (TCS, Infosys, Wipro).</li><li><strong>JavaScript / React</strong> – for frontend and full‑stack positions.</li><li><strong>Cloud basics (AWS / Azure)</strong> – a differentiator that can double your callbacks.</li></ul>
<p><strong>Action step:</strong> Pick one primary language (Python or Java) and learn it deeply (3–4 months). Then add SQL and a minor skill (e.g., React or basic cloud). Do not try to learn everything – depth beats breadth.</p>
<h2>2. Build projects that prove you can ship code</h2>
<p>Employers know you have no work experience. They want to see what you built. A GitHub profile with 3–4 solid projects is worth more than a certificate. Example project ideas:</p>
<ul><li>A task management web app (full‑stack).</li><li>An API that fetches and displays job data (perfect for your own product).</li><li>Automation script (e.g., data cleaning with Python).</li></ul>
<p>Write clean README files, add screenshots, and deploy projects on free platforms (Vercel, Render).</p>
<h2>3. Create an ATS‑friendly resume (template inside)</h2>
<p>Your resume will first be read by software, not a human. Use a simple, single‑column format. Include these sections:</p>
<ul><li><strong>Contact & LinkedIn</strong> (make sure your profile is complete).</li><li><strong>Technical skills</strong> – list them clearly (e.g., “Python, SQL, React, Git”).</li><li><strong>Projects</strong> (2–4) – each with a 2‑line description, technologies used, and a live link / GitHub repo.</li><li><strong>Education</strong> – degree, year, college name, CGPA (if above 7.5).</li><li><strong>Certifications / Achievements</strong> – only if relevant and not spammy.</li></ul>
<p>Avoid photos, columns, graphics, and “References available upon request”.</p>
<h2>4. Where to apply (beyond the job board)</h2>
<p>Your own job board – ApplyMore – is a great start. But also check:</p>
<ul><li><strong>Company career pages</strong> – many fresher roles are never posted on third‑party boards.</li><li><strong>LinkedIn Jobs</strong> – filter by “Entry level” and “Past week”.</li><li><strong>Indeed / Glassdoor</strong> – set alerts for “fresher” and your city.</li><li><strong>Off‑campus drives</strong> – follow companies like Zoho, HCL, Capgemini on LinkedIn.</li></ul>
<p>Create a target list of 30 companies. Apply to 5‑10 per day. Track every application in a spreadsheet (company, role, date, status). Follow up after 7 days if you don’t hear back.</p>
<h2>5. Interview preparation – the STAR method and technical prep</h2>
<p>Most fresher interviews have two parts: technical and HR.</p>
<p><strong>Technical round:</strong> Expect questions on your chosen language (basics, OOP, debugging). Also simple coding problems (reverse string, FizzBuzz, SQL joins). Practice on LeetCode (Easy level) or HackerRank.</p>
<p><strong>HR / Behavioural round:</strong> The most common question: “Tell me about yourself.” Structure your answer: (1) who you are (recent graduate), (2) what you have done (projects, internships), (3) why you want this role.</p>
<p>Use the STAR method for situational questions (Situation, Task, Action, Result). Prepare 3‑5 stories from your projects or college life.</p>
<h2>6. Success story – from 0 to offer in 4 months</h2>
<p>A real example (anonymised): A BCA graduate from Hyderabad knew only basic Python. He built a simple expense tracker web app using Flask and SQLite. He applied to 150 jobs over 4 months, got 12 interviews, and finally received an offer as a Junior Python Developer (₹4.2 LPA). His advice: “Be consistent. Rejections are practice.”</p>
<h2>7. Your 4‑month roadmap</h2>
<ul><li><strong>Month 1:</strong> Learn core language + SQL. Build first simple project.</li><li><strong>Month 2:</strong> Add second skill (e.g., React or Cloud). Build second project. Optimise resume.</li><li><strong>Month 3:</strong> Apply to 10 jobs daily. Practice interview questions every weekend.</li><li><strong>Month 4:</strong> Refine based on feedback. Expect offers.</li></ul>
<p>You don’t need to be a genius – you just need to be consistent. Your first IT job is waiting.</p>`

<p>Companies receive hundreds of applications for every fresher role. They use Applicant Tracking Systems (ATS) to automatically reject 75% of resumes – often before a human reads them. Common mistakes:</p>
<ul><li>Fancy formatting (columns, graphics, tables) – ATS cannot read them.</li><li>Missing keywords from the job description.</li><li>No clear sections (Skills, Projects, Education).</li></ul>

  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderArticle() {
    const id = getQueryParam('id');
    const container = document.getElementById('articleContent');
    if (!container) return;
    if (!id) {
      container.innerHTML = '<div class="error">No article ID specified.</div>';
      return;
    }
    const article = articlesDB[id];
    if (!article) {
      container.innerHTML = '<div class="error">Article not found. It may be coming soon.</div>';
      return;
    }
    const html = `
      <h1>${escapeHtml(article.title)}</h1>
      <div class="meta">
        <span><i class="far fa-calendar-alt"></i> ${escapeHtml(article.date)}</span>
        <span><i class="far fa-clock"></i> ${escapeHtml(article.readTime)}</span>
        <span><span class="category-badge">${escapeHtml(article.category)}</span></span>
      </div>
      <div class="content">${article.content}</div>
      <a href="blog.html" class="back-link">← Back to Blog</a>
    `;
    container.innerHTML = html;
  }

  renderArticle();
