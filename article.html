        <p>Applicant Tracking Systems (ATS) are software used by companies like TCS, Infosys, Amazon, and thousands of startups to filter job applications. They scan your resume for keywords, formatting, and relevance before a human ever sees it. Over 75% of resumes are automatically rejected – often because they are not ATS‑friendly.</p>

        <h2>🤖 How ATS Actually Works (Behind the Scenes)</h2>
        <p>When you upload your resume, the ATS software (e.g., Greenhouse, Lever, Workday) parses it into fields: name, contact, skills, experience, education. It then scores your resume based on keyword matches with the job description.</p>
        <p>If your score is below a threshold (often 60‑70%), your application is automatically archived – never seen by a human.</p>
        <h2>⚠️ Top 5 ATS Killing Mistakes</h2>
        <ol><li><strong>Tables and columns</strong> – ATS reads left‑to‑right, top‑to‑bottom. Columns scramble the order.</li>
        <li><strong>Headers and footers</strong> – often ignored or cause parsing errors.</li>
        <li><strong>Images, logos, graphs</strong> – completely ignored (wasted space).</li>
        <li><strong>Non‑standard fonts</strong> – may turn into gibberish. Use Arial, Calibri, or Times New Roman.</li>
        <li><strong>Not using job‑specific keywords</strong> – even if you have the skill, using a different synonym can cause a miss.</li></ol>
        <h2>✅ How to Test Your Resume</h2>
        <ul><li>Use free ATS checkers like Jobscan (limited free scans) or SkillsRoad.</li>
        <li>Copy the job description and your resume into the tool. It will tell you the match percentage and suggest missing keywords.</li>
        <li>Make a copy of your resume for each job application – adjust the keywords section.</li></ul>
        <p>Fixing these mistakes is the single fastest way to increase your interview calls. Do it today.</p>
      `
