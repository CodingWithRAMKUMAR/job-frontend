  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a2a;--card-bg:rgba(20,20,50,0.65);--text:#f0f3ff;--text-muted:#9ca3cf;--border:rgba(255,255,255,0.1);--accent:#3b82f6;--purple:#8b5cf6}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:1.5rem;line-height:1.6}
    body.light{--bg:#f8fafc;--card-bg:rgba(255,255,255,0.85);--text:#1e293b;--text-muted:#475569;--border:rgba(0,0,0,0.1);--accent:#2563eb}
    body.vibrant{--bg:#fdf2f8;--card-bg:rgba(255,255,255,0.9);--text:#831843;--text-muted:#9d174d;--accent:#ec489a}
    .container{max-width:900px;margin:0 auto}
    .top-bar{display:flex;justify-content:flex-end;gap:0.5rem;margin-bottom:1rem}
    .theme-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:2rem;padding:0.2rem 0.6rem;cursor:pointer;font-size:0.7rem;color:var(--text)}
    .nav-links{display:flex;justify-content:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap}
    .nav-links a{color:var(--text-muted);text-decoration:none;font-size:0.9rem}
    .nav-links a:hover{color:var(--accent)}
    .article-card{background:var(--card-bg);backdrop-filter:blur(10px);border-radius:1.5rem;padding:2rem;border:1px solid var(--border)}
    h1{font-size:2rem;margin-bottom:0.5rem;color:var(--accent)}
    .meta{display:flex;gap:1rem;font-size:0.8rem;color:var(--text-muted);margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:1rem}
    .category-badge{background:rgba(59,130,246,0.2);color:var(--accent);padding:0.2rem 0.8rem;border-radius:2rem;font-size:0.7rem;display:inline-block}
    .content p{margin-bottom:1rem}
    .content h2{margin:1.5rem 0 0.5rem;color:var(--accent)}
    .content h3{margin:1rem 0 0.5rem;color:var(--accent)}
    .content ul, .content ol{margin-left:1.5rem;margin-bottom:1rem}
    .back-link{display:inline-block;margin-top:2rem;color:var(--accent);text-decoration:none}
    .back-link:hover{text-decoration:underline}
    footer{margin-top:3rem;text-align:center;font-size:0.7rem;color:var(--text-muted)}
    .error{text-align:center;padding:2rem;color:var(--text-muted)}
  </style>

<body>
<div class="container">
  <div class="top-bar">
    <button class="theme-btn" id="lightTheme">Light</button>
    <button class="theme-btn" id="darkTheme">Dark</button>
    <button class="theme-btn" id="vibrantTheme">Vibrant</button>
  </div>
  <div class="nav-links">

  <div id="articleContent" class="article-card">
    <div class="error">Loading article...</div>
  </div>
  <footer>
    <p>© 2026 ApplyMore — Helping IT freshers land their dream job</p>
  </footer>
</div>

<script>
  // Theme
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.body.classList.add(savedTheme);
  function setTheme(theme) { document.body.classList.remove('light','vibrant'); if(theme!=='dark') document.body.classList.add(theme); localStorage.setItem('theme',theme); }
  document.getElementById('lightTheme')?.addEventListener('click',()=>setTheme('light'));
  document.getElementById('darkTheme')?.addEventListener('click',()=>setTheme('dark'));
  document.getElementById('vibrantTheme')?.addEventListener('click',()=>setTheme('vibrant'));

  // Article database (will be populated one by one)
  const articlesDB = {
    const articlesDB = {
  1: {
    title: "How to Find Your First IT Job in 2026: Complete Guide",
    category: "Job Search",
    date: "Apr 10, 2026",
    readTime: "8 min",
    content: `
      <p>Landing your first IT job in 2026 is more achievable than you think – but you need a clear roadmap. This guide walks you through every stage, from learning the right skills to negotiating your offer.</p>

      <h2>1. Choose the right technology stack</h2>
      <p>Not all skills are equal. Based on current job market data (LinkedIn, Indeed, Naukri), the most in‑demand entry‑level skills in India for 2026 are:</p>
      <ul>
        <li><strong>Python</strong> – for backend, automation, and data roles.</li>
        <li><strong>SQL</strong> – required for almost every IT job (data, backend, testing).</li>
        <li><strong>Java</strong> – still huge in large enterprises (TCS, Infosys, Wipro).</li>
        <li><strong>JavaScript / React</strong> – for frontend and full‑stack positions.</li>
        <li><strong>Cloud basics (AWS / Azure)</strong> – a differentiator that can double your callbacks.</li>
      </ul>
      <p><strong>Action step:</strong> Pick one primary language (Python or Java) and learn it deeply (3–4 months). Then add SQL and a minor skill (e.g., React or basic cloud). Do not try to learn everything – depth beats breadth.</p>

      <h2>2. Build projects that prove you can ship code</h2>
      <p>Employers know you have no work experience. They want to see what you built. A GitHub profile with 3–4 solid projects is worth more than a certificate. Example project ideas:</p>
      <ul>
        <li>A task management web app (full‑stack).</li>
        <li>An API that fetches and displays job data (perfect for your own product).</li>
        <li>Automation script (e.g., data cleaning with Python).</li>
      </ul>
      <p>Write clean README files, add screenshots, and deploy projects on free platforms (Vercel, Render).</p>

      <h2>3. Create an ATS‑friendly resume (template inside)</h2>
      <p>Your resume will first be read by software, not a human. Use a simple, single‑column format. Include these sections:</p>
      <ul>
        <li><strong>Contact & LinkedIn</strong> (make sure your profile is complete).</li>
        <li><strong>Technical skills</strong> – list them clearly (e.g., “Python, SQL, React, Git”).</li>
        <li><strong>Projects</strong> (2–4) – each with a 2‑line description, technologies used, and a live link / GitHub repo.</li>
        <li><strong>Education</strong> – degree, year, college name, CGPA (if above 7.5).</li>
        <li><strong>Certifications / Achievements</strong> – only if relevant and not spammy.</li>
      </ul>
      <p>Avoid photos, columns, graphics, and “References available upon request”.</p>

      <h2>4. Where to apply (beyond the job board)</h2>
      <p>Your own job board – ApplyMore – is a great start. But also check:</p>
      <ul>
        <li><strong>Company career pages</strong> – many fresher roles are never posted on third‑party boards.</li>
        <li><strong>LinkedIn Jobs</strong> – filter by “Entry level” and “Past week”.</li>
        <li><strong>Indeed / Glassdoor</strong> – set alerts for “fresher” and your city.</li>
        <li><strong>Off‑campus drives</strong> – follow companies like Zoho, HCL, Capgemini on LinkedIn.</li>
      </ul>
      <p>Create a target list of 30 companies. Apply to 5‑10 per day. Track every application in a spreadsheet (company, role, date, status). Follow up after 7 days if you don’t hear back.</p>

      <h2>5. Interview preparation – the STAR method and technical prep</h2>
      <p>Most fresher interviews have two parts: technical and HR.</p>
      <p><strong>Technical round:</strong> Expect questions on your chosen language (basics, OOP, debugging). Also simple coding problems (reverse string, FizzBuzz, SQL joins). Practice on LeetCode (Easy level) or HackerRank.</p>
      <p><strong>HR / Behavioural round:</strong> The most common question: “Tell me about yourself.” Structure your answer: (1) who you are (recent graduate), (2) what you have done (projects, internships), (3) why you want this role.</p>
      <p>Use the STAR method for situational questions (Situation, Task, Action, Result). Prepare 3‑5 stories from your projects or college life.</p>

      <h2>6. Success story – from 0 to offer in 4 months</h2>
      <p>A real example (anonymised): A BCA graduate from Hyderabad knew only basic Python. He built a simple expense tracker web app using Flask and SQLite. He applied to 150 jobs over 4 months, got 12 interviews, and finally received an offer as a Junior Python Developer (₹4.2 LPA). His advice: “Be consistent. Rejections are practice.”</p>

      <h2>7. Your 4‑month roadmap</h2>
      <ul>
        <li><strong>Month 1:</strong> Learn core language + SQL. Build first simple project.</li>
        <li><strong>Month 2:</strong> Add second skill (e.g., React or Cloud). Build second project. Optimise resume.</li>
        <li><strong>Month 3:</strong> Apply to 10 jobs daily. Practice interview questions every weekend.</li>
        <li><strong>Month 4:</strong> Refine based on feedback. Expect offers.</li>
      </ul>
      <p>You don’t need to be a genius – you just need to be consistent. Your first IT job is waiting.</p>
    `
  }
};
  };

  // Helper to get URL parameter
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  // Escape HTML to prevent injection
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Render article content
  function renderArticle() {
    const id = getQueryParam('id');
    if (!id) {
      document.getElementById('articleContent').innerHTML = '<div class="error">No article ID specified.</div>';
      return;
    }
    const article = articlesDB[id];
    if (!article) {
      document.getElementById('articleContent').innerHTML = '<div class="error">Article not found. It may be coming soon.</div>';
      return;
    }
    const html = `
      <h1>${escapeHtml(article.title)}</h1>
      <div class="meta">
        <span><i class="far fa-calendar-alt"></i> ${escapeHtml(article.date)}</span>
        <span><i class="far fa-clock"></i> ${escapeHtml(article.readTime)}</span>
        <span><span class="category-badge">${escapeHtml(article.category)}</span></span>
      </div>
      <div class="content">
        ${article.content}
      </div>
      <a href="blog.html" class="back-link">← Back to Blog</a>
    `;
    document.getElementById('articleContent').innerHTML = html;
  }

  // We will populate articlesDB progressively (ask for confirmation before adding each)
  // For now, we start with an empty object. After you confirm, I will provide the first article content.

  renderArticle();
</script>
</body>
</html>
