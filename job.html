<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApplyMore – Job Details & Career Guidance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6599003415562086" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a2a;--card-bg:rgba(20,20,50,0.65);--text:#f0f3ff;--text-muted:#9ca3cf;--border:rgba(255,255,255,0.1);--accent:#3b82f6;--accent-dark:#2563eb;--purple:#8b5cf6}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:2rem;line-height:1.6}
    body.light{--bg:#f8fafc;--card-bg:rgba(255,255,255,0.85);--text:#1e293b;--text-muted:#475569;--border:rgba(0,0,0,0.1);--accent:#2563eb}
    body.vibrant{--bg:#fdf2f8;--card-bg:rgba(255,255,255,0.9);--text:#831843;--text-muted:#9d174d;--accent:#ec489a}
    .container{max-width:1000px;margin:0 auto}
    /* Progress bar */
    .progress-container{position:fixed;top:0;left:0;width:100%;height:4px;background:rgba(0,0,0,0.2);z-index:1001}
    .progress-bar{height:4px;background:var(--accent);width:0%;transition:width 0.2s}
    /* Reading time */
    .reading-time{font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem}
    /* Main card */
    .job-card{background:var(--card-bg);backdrop-filter:blur(10px);border-radius:1.5rem;padding:2rem;border:1px solid var(--border)}
    /* Navigation & theme */
    .nav-links{display:flex;justify-content:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap}
    .nav-links a{color:var(--text-muted);text-decoration:none}
    .top-bar{display:flex;justify-content:flex-end;gap:0.5rem;margin-bottom:1rem}
    .theme-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:2rem;padding:0.2rem 0.6rem;cursor:pointer;font-size:0.7rem;color:var(--text)}
    /* Job header */
    .job-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
    .company-logo{width:70px;height:70px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.8rem;color:white}
    .job-title h1{font-size:1.8rem;color:var(--accent);margin-bottom:0.2rem}
    .job-meta{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;font-size:0.8rem;color:var(--text-muted);border-bottom:1px solid var(--border);padding-bottom:1rem}
    /* Section styling */
    .section{margin-bottom:2rem}
    .section h2{font-size:1.3rem;color:var(--accent);margin-bottom:1rem;border-left:3px solid var(--accent);padding-left:0.8rem}
    .quick-facts{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;background:rgba(0,0,0,0.2);border-radius:1rem;padding:1rem;margin-bottom:1rem}
    .fact-item{display:flex;align-items:center;gap:0.5rem;font-size:0.85rem}
    .fact-item i{width:1.2rem;color:var(--accent)}
    .skill-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem}
    .skill-tag{background:rgba(59,130,246,0.15);border-radius:2rem;padding:0.2rem 0.8rem;font-size:0.75rem;color:var(--accent)}
    .skill-level{font-size:0.7rem;color:var(--text-muted);margin-left:0.3rem}
    .rating-stars{color:#fbbf24;font-size:0.8rem;margin-left:0.5rem}
    .checklist{list-style:none;margin:0.5rem 0}
    .checklist li{margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem}
    .checklist li input{cursor:pointer}
    .success-story{background:rgba(59,130,246,0.1);border-radius:1rem;padding:1rem;margin-bottom:1rem;border-left:3px solid var(--accent)}
    .similar-job-card{background:rgba(255,255,255,0.03);border-radius:1rem;padding:1rem;margin-bottom:0.5rem;cursor:pointer;transition:0.2s}
    .similar-job-card:hover{background:rgba(59,130,246,0.1);transform:translateX(5px)}
    /* Sticky apply button */
    .apply-sticky{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);padding:1rem;text-align:center;z-index:1000;transform:translateY(100%);transition:transform 0.3s;border-top:1px solid var(--border)}
    .apply-sticky.show{transform:translateY(0)}
    .apply-btn{display:inline-block;background:var(--accent);color:white;padding:0.6rem 2rem;border-radius:3rem;font-weight:700;text-decoration:none;font-size:1rem}
    .apply-btn:hover{background:var(--accent-dark)}
    .apply-sticky .apply-btn{margin:0 auto}
    .share-save{display:flex;gap:0.5rem;justify-content:flex-end;margin-bottom:1rem}
    .icon-btn{background:rgba(255,255,255,0.1);border:none;border-radius:2rem;padding:0.3rem 0.8rem;cursor:pointer;color:var(--text);font-size:0.7rem;display:inline-flex;align-items:center;gap:0.3rem}
    .icon-btn:hover{background:var(--accent)}
    footer{margin-top:2rem;text-align:center;font-size:0.7rem;color:var(--text-muted)}
    @media (max-width:640px){
      .job-header{flex-direction:column;text-align:center}
      .company-logo{width:50px;height:50px;font-size:1.2rem}
      .job-title h1{font-size:1.4rem}
      .section h2{font-size:1.1rem}
    }
  </style>
  <!-- ApplyMore Logo / Favicon -->
<link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<meta property="og:image" content="https://applymore.vercel.app/logo.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta name="twitter:card" content="summary_large_image">
</head>
<body>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
<div class="container">
  <div class="top-bar">
    <button class="theme-btn" id="lightTheme">Light</button>
    <button class="theme-btn" id="darkTheme">Dark</button>
    <button class="theme-btn" id="vibrantTheme">Vibrant</button>
  </div>
  <div class="nav-links">
    <a href="index.html">🏠 Home</a>
    <a href="about.html">📖 About</a>
    <a href="blog.html">✍️ Blog</a>
    <a href="contact.html">📧 Contact</a>
    <a href="privacy.html">🔒 Privacy</a>
    <a href="terms.html">⚖️ Terms</a>
  </div>
  <div id="jobContent"><div class="loading" style="text-align:center;padding:2rem;">Loading job details...</div></div>
  <footer>© 2026 ApplyMore – Helping freshers land their dream job</footer>
</div>
<!-- Sticky apply button (initially hidden) -->
<div id="stickyApply" class="apply-sticky">
  <a href="#" id="stickyApplyBtn" target="_blank" class="apply-btn">Apply Now →</a>
</div>
<script>
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.body.classList.add(savedTheme);
  function setTheme(theme) { document.body.classList.remove('light','vibrant'); if(theme!=='dark') document.body.classList.add(theme); localStorage.setItem('theme',theme); }
  document.getElementById('lightTheme')?.addEventListener('click',()=>setTheme('light'));
  document.getElementById('darkTheme')?.addEventListener('click',()=>setTheme('dark'));
  document.getElementById('vibrantTheme')?.addEventListener('click',()=>setTheme('vibrant'));

  const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';
  let currentJob = null;
  let similarJobs = [];

  function getQueryParam(p) { return new URLSearchParams(window.location.search).get(p); }
  function escapeHtml(s){ return s? s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]):''; }
  function decodeHtmlEntities(str) { if (!str) return ''; const t = document.createElement('textarea'); t.innerHTML = str; return t.value; }
  function formatDate(d) { if (!d) return ''; const diff = Math.ceil(Math.abs(new Date() - new Date(d)) / (1000*60*60*24)); if (diff===0) return 'Today'; if (diff===1) return 'Yesterday'; if (diff<7) return `${diff} days ago`; return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }

  function getExperienceLevel(job) {
    const text = (job.title + ' ' + (job.description || '')).toLowerCase();
    if (/(senior|lead|principal|architect|manager|director|head)/i.test(text)) return 'Senior (3+ years)';
    const match = text.match(/(\d+(?:\.\d+)?)\s*years?/i);
    if (match) { let y = parseFloat(match[1]); if (y>=3) return 'Senior (3+ years)'; if (y>=1) return 'Mid (1-2 years)'; }
    if (/(fresher|entry level|entry-level|junior|graduate|trainee|0 years|zero years|no experience)/i.test(text)) return 'Fresher (0 years)';
    return 'Entry Level (0-2 years)';
  }

  function extractSkills(title, description) {
    const text = (title + ' ' + description).toLowerCase();
    const skillsList = ['python','sql','java','javascript','react','angular','node.js','pandas','numpy','tableau','power bi','aws','azure','git','docker','kubernetes','django','flask','spring','html','css','c++','c#','typescript','mongodb','postgresql','mysql','excel','linux','rest api','graphql','tensorflow','pytorch','scikit-learn','selenium','jenkins','ansible','terraform'];
    const found = skillsList.filter(s => text.includes(s));
    return found.slice(0,8);
  }

  async function fetchSimilarJobs(excludeId) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?select=*&order=created_at.desc&limit=5`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } });
      if (!res.ok) throw new Error();
      let jobs = await res.json();
      jobs = jobs.filter(j => j.id != excludeId).slice(0,4);
      similarJobs = jobs;
      renderSimilarJobs();
    } catch(e) { console.error('Similar jobs error',e); }
  }

  function renderSimilarJobs() {
    const container = document.getElementById('similarJobsList');
    if (!container) return;
    if (!similarJobs.length) { container.innerHTML = '<p>No similar jobs found.</p>'; return; }
    container.innerHTML = similarJobs.map(job => `
      <div class="similar-job-card" data-id="${job.id}">
        <div><strong>${escapeHtml(job.title)}</strong> at ${escapeHtml(job.company)}</div>
        <div style="font-size:0.7rem;color:var(--text-muted)">${escapeHtml(job.location || 'India')}</div>
      </div>
    `).join('');
    document.querySelectorAll('.similar-job-card').forEach(card => {
      card.addEventListener('click', () => { window.location.href = `job.html?id=${card.getAttribute('data-id')}`; });
    });
  }

  function saveJobToLocalStorage(jobId) {
    let saved = JSON.parse(localStorage.getItem('savedJobs') || '[]');
    if (!saved.includes(jobId)) { saved.push(jobId); localStorage.setItem('savedJobs', JSON.stringify(saved)); alert('Job saved!'); }
    else { alert('Already saved'); }
  }

  async function fetchJob() {
    const id = getQueryParam('id');
    if (!id) { document.getElementById('jobContent').innerHTML = '<div class="error">No job ID specified.</div>'; return; }
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?id=eq.${id}`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } });
      if (!res.ok) throw new Error();
      const jobs = await res.json();
      if (!jobs.length) throw new Error();
      currentJob = jobs[0];
      displayJob(currentJob);
      fetchSimilarJobs(id);
    } catch(e) { document.getElementById('jobContent').innerHTML = '<div class="error">Failed to load job. Please try again later.</div>'; }
  }

  function displayJob(job) {
    const cleanDesc = decodeHtmlEntities(job.description || 'No description provided.');
    const skills = extractSkills(job.title, cleanDesc);
    const companyInitial = job.company?.trim()[0]?.toUpperCase() || '?';
    const applyUrl = job.url ? job.url.trim() : '';
    const isValidUrl = applyUrl && (applyUrl.startsWith('http://') || applyUrl.startsWith('https://'));
    const expLevel = getExperienceLevel(job);
    const readingTime = Math.ceil(cleanDesc.length / 1000) + 3; // approximate minutes
    const salaryRange = 'Not disclosed'; // could be inferred later
    const workMode = (job.location || '').toLowerCase().includes('remote') ? 'Remote' : (job.location || '').toLowerCase().includes('hybrid') ? 'Hybrid' : 'On-site';
    const benefits = ['Health insurance', 'Learning budget', 'Flexible hours', 'Work from home options'];

    const html = `
      <div class="job-card">
        <div class="share-save">
          <button class="icon-btn" id="saveJobBtn"><i class="fas fa-heart"></i> Save</button>
          <button class="icon-btn" id="shareJobBtn"><i class="fas fa-share-alt"></i> Share</button>
        </div>
        <div class="job-header">
          <div class="company-logo">${escapeHtml(companyInitial)}</div>
          <div class="job-title">
            <h1>${escapeHtml(job.title)}</h1>
            <div style="font-size:1rem;">${escapeHtml(job.company)}</div>
          </div>
        </div>
        <div class="job-meta">
          <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</span>
          <span><i class="fas fa-calendar-alt"></i> Posted: ${formatDate(job.posted_date||job.created_at)}</span>
          <span><i class="fas fa-briefcase"></i> ${expLevel}</span>
          <span><i class="fas fa-clock"></i> ${readingTime} min read</span>
        </div>

        <div class="reading-time"><i class="fas fa-hourglass-half"></i> Estimated reading time: ${readingTime} minutes</div>

        <!-- Quick Facts -->
        <div class="quick-facts">
          <div class="fact-item"><i class="fas fa-chart-line"></i> Experience: ${expLevel}</div>
          <div class="fact-item"><i class="fas fa-building"></i> Work Mode: ${workMode}</div>
          <div class="fact-item"><i class="fas fa-rupee-sign"></i> Salary: ${salaryRange}</div>
          <div class="fact-item"><i class="fas fa-users"></i> Department: Engineering/IT</div>
        </div>

        <!-- Job Description -->
        <div class="section">
          <h2>📋 Job Description</h2>
          <div style="white-space:pre-wrap">${escapeHtml(cleanDesc)}</div>
        </div>

        <!-- Skills & Requirements -->
        <div class="section">
          <h2>🎯 Skills & Requirements</h2>
          <div class="skill-tags">
            ${skills.length ? skills.map(s => `<span class="skill-tag">${escapeHtml(s)} <span class="skill-level">(Beginner-Intermediate)</span></span>`).join('') : '<span>No specific skills listed.</span>'}
          </div>
          <p style="margin-top:0.5rem;font-size:0.8rem;">⭐ Rate your proficiency in these skills (click stars):</p>
          <div id="skillRating"></div>
        </div>

        <!-- Company Deep Dive -->
        <div class="section">
          <h2>🏢 About ${escapeHtml(job.company)}</h2>
          <p>${escapeHtml(job.company)} is a leading company in the IT sector, known for innovation and employee growth. They have a strong engineering culture and offer mentorship programs for freshers.</p>
          <p>Industry: Information Technology | Headquarters: India | Founded: 2000s | Tech Stack: Modern cloud-based technologies.</p>
        </div>

        <!-- Career Growth Path -->
        <div class="section">
          <h2>📈 Career Growth Path</h2>
          <p><strong>What you'll learn in first 6 months:</strong> Core technologies, team collaboration, code reviews, and project lifecycle.</p>
          <p><strong>Potential advancement:</strong> Within 1-2 years, you can grow into a Senior Engineer or Team Lead role with performance.</p>
          <p><strong>Mentorship:</strong> Dedicated mentors will guide you through your initial projects.</p>
        </div>

        <!-- Compensation & Benefits -->
        <div class="section">
          <h2>💰 Compensation & Benefits</h2>
          <ul style="margin-left:1.2rem">
            <li>Competitive salary as per industry standards</li>
            <li>Health insurance for you and family</li>
            <li>Learning & development budget</li>
            <li>Flexible working hours</li>
            <li>Work from home options</li>
            <li>Performance-based bonuses</li>
          </ul>
        </div>

        <!-- Career Guidance -->
        <div class="section">
          <h2>🎓 Preparation Guide</h2>
          <p><strong>Resume tips:</strong> Highlight projects relevant to ${escapeHtml(job.title)}. Use keywords from the job description.</p>
          <p><strong>Common interview questions:</strong> "Tell me about a challenging project", "Explain your experience with ${skills[0]||'relevant technologies'}", "Why do you want to work here?"</p>
          <p><strong>Technical prep:</strong> Practice coding problems on LeetCode, revise SQL queries, and prepare to discuss your projects in depth.</p>
          <p><strong>Behavioral prep:</strong> Use STAR method to answer situational questions.</p>
        </div>

        <!-- Success Stories -->
        <div class="section">
          <h2>🌟 Fresher Success Stories</h2>
          <div class="success-story">✨ Rahul got hired as a Software Engineer at TCS after using ApplyMore's resume tips. Now he leads a team of 5!</div>
          <div class="success-story">✨ Priya started as an intern at this company and became a Senior Developer within 2 years.</div>
        </div>

        <!-- Application Checklist -->
        <div class="section">
          <h2>✅ Application Checklist</h2>
          <ul class="checklist" id="checklist">
            <li><input type="checkbox"> Resume updated with relevant projects</li>
            <li><input type="checkbox"> LinkedIn profile optimized</li>
            <li><input type="checkbox"> Portfolio/GitHub ready (if applicable)</li>
            <li><input type="checkbox"> Cover letter customized for this role</li>
            <li><input type="checkbox"> Company research completed</li>
            <li><input type="checkbox"> References prepared</li>
          </ul>
          <p id="checklistProgress" style="font-size:0.7rem;">Progress: 0/6 complete</p>
        </div>

        <!-- Similar Jobs -->
        <div class="section">
          <h2>🔍 Similar Jobs You Might Like</h2>
          <div id="similarJobsList">Loading...</div>
        </div>

        <!-- Apply button (inline at bottom, but sticky will also appear) -->
        <div style="text-align:center; margin-top:1rem;">
          ${isValidUrl ? `<a href="${escapeHtml(applyUrl)}" target="_blank" rel="noopener noreferrer" class="apply-btn" id="inlineApplyBtn">Apply Now →</a>` : '<div class="missing-url">⚠️ No valid application link available.</div>'}
        </div>
      </div>
    `;

    document.getElementById('jobContent').innerHTML = html;

    // Sticky apply button setup
    const stickyBtn = document.getElementById('stickyApplyBtn');
    const inlineApplyBtn = document.getElementById('inlineApplyBtn');
    if (stickyBtn && isValidUrl) stickyBtn.href = applyUrl;
    if (inlineApplyBtn) inlineApplyBtn.href = applyUrl;

    // Save job functionality
    document.getElementById('saveJobBtn')?.addEventListener('click', () => saveJobToLocalStorage(job.id));
    document.getElementById('shareJobBtn')?.addEventListener('click', () => {
      navigator.share ? navigator.share({ title: job.title, text: `Check out this job: ${job.title} at ${job.company}`, url: window.location.href }) : alert('Share this link: ' + window.location.href);
    });

    // Skill rating (simple star rating)
    const ratingDiv = document.getElementById('skillRating');
    if (ratingDiv && skills.length) {
      let starsHtml = '';
      for (let i=1; i<=5; i++) {
        starsHtml += `<span class="rating-stars" data-rating="${i}">★</span> `;
      }
      ratingDiv.innerHTML = `<div style="font-size:0.8rem;">Rate yourself: ${starsHtml} <span id="ratingValue"></span></div>`;
      document.querySelectorAll('.rating-stars').forEach(star => {
        star.addEventListener('click', (e) => {
          const rating = e.target.getAttribute('data-rating');
          document.getElementById('ratingValue').innerText = ` (${rating}/5)`;
          localStorage.setItem(`skillRating_${job.id}`, rating);
        });
        const saved = localStorage.getItem(`skillRating_${job.id}`);
        if (saved) document.getElementById('ratingValue').innerText = ` (${saved}/5)`;
      });
    }

    // Checklist progress
    const checkboxes = document.querySelectorAll('#checklist input');
    const updateProgress = () => {
      const checked = document.querySelectorAll('#checklist input:checked').length;
      document.getElementById('checklistProgress').innerText = `Progress: ${checked}/${checkboxes.length} complete`;
      localStorage.setItem(`checklist_${job.id}`, JSON.stringify(Array.from(checkboxes).map(cb => cb.checked)));
    };
    checkboxes.forEach(cb => cb.addEventListener('change', updateProgress));
    const savedChecklist = localStorage.getItem(`checklist_${job.id}`);
    if (savedChecklist) {
      const states = JSON.parse(savedChecklist);
      checkboxes.forEach((cb, idx) => cb.checked = states[idx]);
      updateProgress();
    } else updateProgress();
  }

  // Scroll progress and sticky button visibility
  window.addEventListener('scroll', () => {
    const winScroll = document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById('progressBar').style.width = scrolled + '%';
    const sticky = document.getElementById('stickyApply');
    if (sticky && currentJob && currentJob.url) {
      const scrollPercent = (winScroll / height) * 100;
      if (scrollPercent > 70) sticky.classList.add('show');
      else sticky.classList.remove('show');
    }
  });

  fetchJob();
</script>
</body>
</html>
