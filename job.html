<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6599003415562086" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore – Job Details & Career Resources</title>
  <meta name="description" content="Full job details, skills, resume tips, interview prep, and similar jobs. Apply directly.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --accent-light: #60a5fa;
      --purple: #8b5cf6;
      --pink: #ec489a;
      --glass-bg: rgba(15, 25, 45, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --card-bg: linear-gradient(135deg, rgba(25, 35, 65, 0.8), rgba(20, 25, 55, 0.7));
      --text-primary: #f0f3ff;
      --text-secondary: #9ca3cf;
      --text-muted: #6b7280;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a2a;
      color: var(--text-primary);
      padding: 2rem;
      position: relative;
      min-height: 100vh;
    }
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #1a1a4a, #0a0a2a);
      z-index: -2;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      pointer-events: none;
      z-index: -1;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, var(--accent), transparent); top: -100px; left: -100px; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, var(--purple), transparent); bottom: -150px; right: -100px; animation-delay: -5s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.95); }
    }
    .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 2; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: 0.3s;
    }
    .back-link:hover { gap: 0.8rem; color: var(--purple); }
    .theme-bar {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .theme-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--text-primary);
      transition: all 0.3s ease;
    }
    .theme-btn:hover { background: var(--accent); }
    /* Job header */
    .job-header {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--glass-border);
    }
    .job-header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent); }
    .company-name { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem; }
    .job-meta { display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
    /* Informational sections */
    .info-section {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 1.2rem;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
      border: 1px solid var(--glass-border);
      transition: 0.3s;
    }
    .info-section h3 {
      font-size: 1.2rem;
      margin-bottom: 0.8rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .info-section p, .info-section ul {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .info-section ul { margin-left: 1.2rem; }
    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.8rem;
    }
    .skill-tag {
      background: rgba(59, 130, 246, 0.15);
      border-radius: 2rem;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      color: var(--accent);
    }
    /* Full description */
    .description-section {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 1.2rem;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
      border: 1px solid var(--glass-border);
    }
    .description-section h3 { font-size: 1.2rem; margin-bottom: 0.8rem; color: var(--accent); }
    .description-section p { font-size: 0.9rem; line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap; }
    /* Similar jobs */
    .similar-jobs-section {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border-radius: 1.2rem;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
      border: 1px solid var(--glass-border);
    }
    .similar-jobs-section h3 { font-size: 1.2rem; margin-bottom: 0.8rem; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; }
    .similar-jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .similar-job-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 1rem;
      padding: 1rem;
      border: 1px solid var(--glass-border);
      transition: 0.3s;
      cursor: pointer;
    }
    .similar-job-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }
    .similar-job-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .similar-job-company { font-size: 0.8rem; color: var(--accent); margin-bottom: 0.3rem; }
    .similar-job-location { font-size: 0.7rem; color: var(--text-muted); }
    /* Apply button at bottom */
    .apply-section {
      background: linear-gradient(135deg, rgba(25, 35, 65, 0.9), rgba(20, 25, 55, 0.8));
      backdrop-filter: blur(16px);
      border-radius: 1.2rem;
      padding: 1.5rem;
      text-align: center;
      border: 1px solid var(--glass-border);
      margin: 1rem 0 2rem;
    }
    .apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 3rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .apply-btn:hover { gap: 1rem; box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4); transform: scale(1.02); }
    .apply-note { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.8rem; }
    .loading, .error { text-align: center; padding: 3rem; background: var(--glass-bg); border-radius: 1rem; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: var(--text-muted); }
    @media (max-width: 640px) {
      body { padding: 1rem; }
      .job-header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <div class="theme-bar">
      <button class="theme-btn" id="lightTheme">Light</button>
      <button class="theme-btn" id="darkTheme">Dark</button>
      <button class="theme-btn" id="vibrantTheme">Vibrant</button>
    </div>

    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Jobs</a>

    <div id="jobContent">
      <div class="loading">Loading job details...</div>
    </div>

    <footer>
      <p>© 2026 ApplyMore – Helping freshers land their dream job</p>
    </footer>
  </div>

  <script>
    const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';
    let currentJobId = null;

    function decodeHtmlEntities(str) {
      if (!str) return '';
      const textarea = document.createElement('textarea');
      textarea.innerHTML = str;
      return textarea.value;
    }

    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    // Extract common skills
    function extractSkills(title, description) {
      const text = (title + ' ' + description).toLowerCase();
      const commonSkills = ['python', 'sql', 'java', 'javascript', 'react', 'angular', 'node.js', 'pandas', 'numpy', 'tableau', 'power bi', 'aws', 'azure', 'git', 'docker', 'kubernetes', 'django', 'flask', 'spring', 'html', 'css', 'c++', 'c#', 'typescript', 'mongodb', 'postgresql', 'mysql', 'excel'];
      return commonSkills.filter(skill => text.includes(skill)).slice(0, 8);
    }

    async function fetchJob() {
      const jobId = getQueryParam('id');
      if (!jobId) {
        document.getElementById('jobContent').innerHTML = `<div class="error">❌ No job ID specified.</div>`;
        return;
      }
      currentJobId = jobId;
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?id=eq.${jobId}`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const jobs = await response.json();
        if (!jobs || jobs.length === 0) throw new Error('Job not found');
        displayJob(jobs[0]);
        fetchLatestJobs(jobId);
      } catch (err) {
        console.error(err);
        document.getElementById('jobContent').innerHTML = `<div class="error">⚠️ Failed to load job. Please try again later.</div>`;
      }
    }

    async function fetchLatestJobs(excludeId) {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?select=*&order=created_at.desc&limit=6`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        let jobs = await response.json();
        jobs = jobs.filter(job => job.id != excludeId).slice(0, 6);
        if (jobs.length === 0) return;
        const container = document.getElementById('similarJobsGrid');
        container.innerHTML = jobs.map(job => `
          <div class="similar-job-card" data-job-id="${job.id}">
            <div class="similar-job-title">${escapeHtml(job.title)}</div>
            <div class="similar-job-company">${escapeHtml(job.company)}</div>
            <div class="similar-job-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</div>
          </div>
        `).join('');
        document.getElementById('similarJobsSection').style.display = 'block';
        document.querySelectorAll('.similar-job-card').forEach(card => {
          card.addEventListener('click', () => {
            const jobId = card.getAttribute('data-job-id');
            window.location.href = `job.html?id=${jobId}`;
          });
        });
      } catch (err) {
        console.error('Error fetching similar jobs:', err);
      }
    }

    function displayJob(job) {
      const rawDesc = job.description || '';
      const cleanDesc = decodeHtmlEntities(rawDesc);
      const skills = extractSkills(job.title, cleanDesc);
      const companyInitial = job.company ? job.company.trim()[0].toUpperCase() : '?';
      document.title = `${job.title} at ${job.company} – ApplyMore`;

      // Helper to generate random tips (but consistent for each job)
      const resumeTips = [
        "Keep your resume concise and one page – Recruiters prefer short, focused resumes.",
        "Use a clean, professional design – Simple layouts make your resume easy to read.",
        "Add job‑related keywords for ATS – Include terms from the job description.",
        "Include a professional email and LinkedIn link – Shows credibility.",
        "Highlight key projects and achievements – Demonstrate real results.",
        "Avoid clichés like 'hardworking' – show examples instead.",
        "Tailor your resume for each application – match keywords."
      ];
      const interviewTips = [
        "Research the company before attending – Understand their products and culture.",
        "Practice common interview questions – Use the STAR method for answers.",
        "Ask smart questions at the end – Reflects curiosity and enthusiasm.",
        "Maintain confidence and good body language – Positive posture leaves a strong impression.",
        "Send a thank‑you note after the interview – Reinforces professionalism."
      ];
      const applicationTips = [
        "Read the job description carefully before applying.",
        "Fill out all required fields – avoid leaving blanks (use 'N/A' if needed).",
        "Double‑check your contact information – email and phone number.",
        "Submit before the deadline – don't wait until the last minute.",
        "Use a professional email address – avoid nicknames or numbers."
      ];
      const faq = [
        { q: "Can I apply if I'm still a student?", a: "Yes, many fresher jobs accept final‑year students. Check the eligibility section in the job description." },
        { q: "Do I need prior experience?", a: "This job is for freshers (0‑2 years). Focus on your projects and internships." },
        { q: "How long does it take to hear back?", a: "Typically 1‑3 weeks. If you don't hear back, follow up politely on LinkedIn." },
        { q: "Should I apply if I don't meet all skills?", a: "Yes, if you meet 60‑70% of the requirements. Fresher roles value learning potential." }
      ];

      const html = `
        <!-- Job Header -->
        <div class="job-header">
          <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
            <div style="width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.5rem; text-transform: uppercase;">
              ${escapeHtml(companyInitial)}
            </div>
            <div>
              <h1>${escapeHtml(job.title)}</h1>
              <div class="company-name">${escapeHtml(job.company)}</div>
            </div>
          </div>
          <div class="job-meta">
            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</span>
            <span><i class="fas fa-calendar-alt"></i> Posted: ${formatDate(job.posted_date || job.created_at)}</span>
          </div>
        </div>

        <!-- Skills Section -->
        <div class="info-section">
          <h3><i class="fas fa-microchip"></i> Skills You'll Need</h3>
          <div class="skill-tags">
            ${skills.length ? skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('') : '<span>No specific skills extracted. Check description below.</span>'}
          </div>
          <p style="margin-top: 0.8rem;">Focus on building projects around these technologies. Even basic proficiency is valued for freshers.</p>
        </div>

        <!-- Resume Tips -->
        <div class="info-section">
          <h3><i class="fas fa-file-alt"></i> Resume Tips for This Role</h3>
          <ul>
            ${resumeTips.map(tip => `<li>${escapeHtml(tip)}</li>`).join('')}
          </ul>
        </div>

        <!-- Interview Tips -->
        <div class="info-section">
          <h3><i class="fas fa-chalkboard-user"></i> Interview Preparation</h3>
          <ul>
            ${interviewTips.map(tip => `<li>${escapeHtml(tip)}</li>`).join('')}
          </ul>
        </div>

        <!-- Full Job Description -->
        <div class="description-section">
          <h3><i class="fas fa-align-left"></i> Full Job Description</h3>
          <p>${escapeHtml(cleanDesc) || 'No description provided.'}</p>
        </div>

        <!-- Application Guide -->
        <div class="info-section">
          <h3><i class="fas fa-pen-alt"></i> How to Apply (Step‑by‑Step)</h3>
          <ul>
            ${applicationTips.map(tip => `<li>${escapeHtml(tip)}</li>`).join('')}
          </ul>
          <p style="margin-top: 0.5rem;"><strong>Important:</strong> Only official company job openings are posted. Read the full description before applying.</p>
        </div>

        <!-- FAQ -->
        <div class="info-section">
          <h3><i class="fas fa-question-circle"></i> Frequently Asked Questions</h3>
          ${faq.map(item => `
            <div style="margin-bottom: 0.8rem;">
              <strong style="color: var(--accent);">Q: ${escapeHtml(item.q)}</strong><br>
              <span style="font-size: 0.85rem;">${escapeHtml(item.a)}</span>
            </div>
          `).join('')}
        </div>

        <!-- Similar Jobs -->
        <div id="similarJobsSection" class="similar-jobs-section" style="display: none;">
          <h3><i class="fas fa-clock"></i> Latest Jobs for You</h3>
          <div id="similarJobsGrid" class="similar-jobs-grid"></div>
        </div>

        <!-- Apply Button (bottom) -->
        <div class="apply-section">
          <a href="${escapeHtml(job.url)}" target="_blank" class="apply-btn">Apply Now <i class="fas fa-arrow-right"></i></a>
          <div class="apply-note">You will be redirected to the original job posting (LinkedIn/Indeed).</div>
          <div class="apply-note">📌 Read the job description carefully before applying. Apply only once per job.</div>
        </div>
      `;

      document.getElementById('jobContent').innerHTML = html;
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      const now = new Date();
      const diffDays = Math.ceil(Math.abs(now - date) / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function setTheme(theme) {
      const themes = {
        dark: { '--glass-bg': 'rgba(15, 25, 45, 0.65)', '--text-primary': '#f0f3ff', '--text-secondary': '#9ca3cf' },
        light: { '--glass-bg': 'rgba(255, 255, 255, 0.75)', '--text-primary': '#1e293b', '--text-secondary': '#475569' },
        vibrant: { '--glass-bg': 'rgba(255, 240, 245, 0.75)', '--text-primary': '#831843', '--text-secondary': '#9d174d' }
      };
      const selected = themes[theme];
      if (selected) {
        Object.entries(selected).forEach(([key, value]) => document.documentElement.style.setProperty(key, value));
        localStorage.setItem('theme', theme);
        document.body.style.background = theme === 'light' ? '#f8fafc' : (theme === 'vibrant' ? '#fdf2f8' : '#0a0a2a');
      }
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);
    document.getElementById('lightTheme')?.addEventListener('click', () => setTheme('light'));
    document.getElementById('darkTheme')?.addEventListener('click', () => setTheme('dark'));
    document.getElementById('vibrantTheme')?.addEventListener('click', () => setTheme('vibrant'));

    fetchJob();
  </script>
</body>
</html>
