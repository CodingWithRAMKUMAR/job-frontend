<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApplyMore | Next-Gen Job Platform</title>
  <meta name="description" content="ApplyMore finds the latest IT fresher jobs across India. Search, filter by location, and apply directly to company websites. Free and updated daily.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ===== Theme Variables ===== */
    :root {
      --bg: #020617;
      --card: #0f172a;
      --accent: #6366f1;
      --accent2: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.05);
      --shadow: 0 8px 20px rgba(0,0,0,0.2);
      --tag-bg: rgba(99,102,241,0.2);
      --deadline-bg: #fee2e2;
      --deadline-text: #dc2626;
    }
    body.light {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #475569;
      --border: #e2e8f0;
      --shadow: 0 8px 20px rgba(0,0,0,0.05);
      --tag-bg: rgba(99,102,241,0.1);
    }
    body.vibrant {
      --bg: #fff0f5;
      --card: #ffffff;
      --text: #831843;
      --muted: #be185d;
      --border: #fbcfe8;
      --shadow: 0 8px 20px rgba(0,0,0,0.05);
      --accent: #ec489a;
      --accent2: #f472b6;
      --tag-bg: rgba(236,72,153,0.1);
      --deadline-bg: #fee2e2;
      --deadline-text: #dc2626;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, var(--bg) 0%, var(--bg) 100%);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 1200px; margin: auto; padding: 20px; }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .logo {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      color: transparent;
    }
    .theme-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .theme-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      transition: 0.2s;
      color: var(--text);
    }
    .theme-btn:hover {
      background: var(--accent);
      color: white;
    }
    .accent-picker {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--card);
      padding: 4px 8px;
      border-radius: 30px;
      border: 1px solid var(--border);
    }
    .accent-picker label {
      font-size: 12px;
    }
    #accentColor {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: var(--accent);
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 50px;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      color: transparent;
    }
    .hero p {
      color: var(--muted);
      margin-top: 10px;
    }

    /* Search & Filter */
    .search-bar {
      display: flex;
      gap: 12px;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .search-bar input, .location-filter select {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      font-size: 14px;
    }
    .location-filter select {
      flex: 0.5;
      min-width: 150px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }

    /* Card */
    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(99,102,241,0.2), transparent);
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
    }
    .card:hover::after {
      opacity: 1;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .company {
      color: var(--accent);
      margin: 6px 0;
      font-weight: 500;
    }
    .location {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .description {
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .deadline {
      font-size: 11px;
      color: var(--deadline-text);
      background: var(--deadline-bg);
      display: inline-block;
      padding: 4px 8px;
      border-radius: 20px;
      margin: 8px 0;
    }
    .tags {
      margin: 8px 0;
    }
    .tag {
      display: inline-block;
      padding: 4px 8px;
      font-size: 10px;
      background: var(--tag-bg);
      border-radius: 6px;
      margin-right: 5px;
      color: var(--accent);
    }
    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 16px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 30px;
      color: white;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }

    /* Skeleton */
    .skeleton {
      height: 200px;
      border-radius: 16px;
      background: linear-gradient(90deg, var(--card) 0%, rgba(255,255,255,0.1) 50%, var(--card) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 50px;
      color: var(--muted);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0;
    }
    .footer-links a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .hero h1 { font-size: 32px; }
      .search-bar, .location-filter select { width: 100%; }
      .search-bar { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">ApplyMore</div>
    <div class="theme-controls">
      <button class="theme-btn" id="lightTheme">Light</button>
      <button class="theme-btn" id="darkTheme">Dark</button>
      <button class="theme-btn" id="vibrantTheme">Vibrant</button>
      <div class="accent-picker">
        <label>Accent</label>
        <input type="color" id="accentColor" value="#6366f1">
      </div>
    </div>
  </header>

  <div class="hero">
    <h1>Land Your Dream Job Faster</h1>
    <p>Smart job discovery for IT freshers across India</p>
  </div>

  <div class="search-bar">
    <input id="search" placeholder="Search roles, companies, skills...">
    <div class="location-filter">
      <select id="locationFilter">
        <option value="all">All Locations</option>
        <option value="Hyderabad">Hyderabad</option>
        <option value="Bangalore">Bangalore</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Delhi">Delhi</option>
        <option value="Chennai">Chennai</option>
        <option value="Pune">Pune</option>
        <option value="Kolkata">Kolkata</option>
        <option value="Ahmedabad">Ahmedabad</option>
      </select>
    </div>
  </div>

  <div id="jobs" class="grid"></div>

  <footer>
    <div class="footer-links">
      <a href="#" id="shareTwitter"><i class="fab fa-twitter"></i> Share on Twitter</a>
      <a href="#" id="shareLinkedin"><i class="fab fa-linkedin"></i> Share on LinkedIn</a>
    </div>
    <p>Made with ❤️ by Ram — Helping freshers land their dream job.</p>
    <p class="copyright">© 2026 ApplyMore. All jobs are fetched automatically from trusted sources.</p>
  </footer>
</div>

<script>
  const API = "https://job-api-xizv.onrender.com/api/jobs";
  let allJobs = [];

  function showSkeleton() {
    document.getElementById('jobs').innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');
  }

  async function loadJobs() {
    showSkeleton();
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allJobs = await res.json();
      renderJobs();
    } catch (err) {
      document.getElementById('jobs').innerHTML = `<div style="text-align:center; padding:40px;">Failed to load jobs. Please refresh.</div>`;
    }
  }

  function stripHtml(html) {
    if (!html) return '';
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function renderJobs() {
    const searchTerm = document.getElementById('search').value.toLowerCase();
    const selectedLocation = document.getElementById('locationFilter').value;

    let filtered = allJobs;
    if (selectedLocation !== 'all') {
      filtered = filtered.filter(job => job.location && job.location.toLowerCase().includes(selectedLocation.toLowerCase()));
    }
    if (searchTerm) {
      filtered = filtered.filter(job =>
        job.title.toLowerCase().includes(searchTerm) ||
        job.company.toLowerCase().includes(searchTerm) ||
        (job.description && job.description.toLowerCase().includes(searchTerm))
      );
    }

    const container = document.getElementById('jobs');
    if (!filtered.length) {
      container.innerHTML = '<div style="text-align:center; padding:40px;">No jobs found. Check back soon!</div>';
      return;
    }

    container.innerHTML = filtered.map(job => {
      const cleanDesc = stripHtml(job.description).substring(0, 180);
      const deadlineHtml = job.applicationDeadline ?
        `<div class="deadline">⏰ Apply by ${formatDate(job.applicationDeadline)}</div>` : '';
      return `
        <div class="card">
          <div class="title">${escapeHtml(job.title)}</div>
          <div class="company">${escapeHtml(job.company)}</div>
          <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Remote')}</div>
          <div class="description">${escapeHtml(cleanDesc)}...</div>
          <div class="tags">
            <span class="tag">Fresher</span>
            <span class="tag">IT</span>
          </div>
          ${deadlineHtml}
          <a href="${escapeHtml(job.url)}" target="_blank" class="btn">Apply Now →</a>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Theme switching (same as before)
  function setTheme(theme) {
    document.body.classList.remove('light', 'vibrant');
    if (theme !== 'dark') document.body.classList.add(theme);
    localStorage.setItem('theme', theme);
  }
  function setAccent(color) {
    document.documentElement.style.setProperty('--accent', color);
    const darkColor = shadeColor(color, -20);
    document.documentElement.style.setProperty('--accent2', darkColor);
    localStorage.setItem('accentColor', color);
  }
  function shadeColor(color, percent) {
    let R = parseInt(color.substring(1,3), 16);
    let G = parseInt(color.substring(3,5), 16);
    let B = parseInt(color.substring(5,7), 16);
    R = Math.min(255, Math.max(0, R + (R * percent / 100)));
    G = Math.min(255, Math.max(0, G + (G * percent / 100)));
    B = Math.min(255, Math.max(0, B + (B * percent / 100)));
    return `#${((1 << 24) + (R << 16) + (G << 8) + B).toString(16).slice(1)}`;
  }

  const savedTheme = localStorage.getItem('theme') || 'dark';
  setTheme(savedTheme);
  const savedAccent = localStorage.getItem('accentColor') || '#6366f1';
  setAccent(savedAccent);
  document.getElementById('accentColor').value = savedAccent;

  document.getElementById('lightTheme').addEventListener('click', () => setTheme('light'));
  document.getElementById('darkTheme').addEventListener('click', () => setTheme('dark'));
  document.getElementById('vibrantTheme').addEventListener('click', () => setTheme('vibrant'));
  document.getElementById('accentColor').addEventListener('input', (e) => setAccent(e.target.value));

  document.getElementById('search').addEventListener('input', renderJobs);
  document.getElementById('locationFilter').addEventListener('change', renderJobs);

  document.getElementById('shareTwitter').addEventListener('click', (e) => {
    e.preventDefault();
    window.open(`https://twitter.com/intent/tweet?text=Find IT fresher jobs in India! ${encodeURIComponent(window.location.href)}`, '_blank');
  });
  document.getElementById('shareLinkedin').addEventListener('click', (e) => {
    e.preventDefault();
    window.open(`https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(window.location.href)}&title=IT Fresher Jobs in India`, '_blank');
  });

  loadJobs();
</script>
</body>
</html>
