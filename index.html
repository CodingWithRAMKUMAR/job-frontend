  <style>
    /* Your existing CSS – unchanged from the last working version */

    .controls {

    .new-badge, .expiring-badge { font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 1rem; }
    .new-badge { background: #22c55e; }
    .expiring-badge { background: #f97316; }
    .fresher-badge {
      background: #8b5cf6;

      background: var(--accent);

      border-radius: 2rem;
      font-size: 0.7rem;
      text-decoration: none;
    }
    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .skeleton-card { background: rgba(30,35,70,0.5); border-radius: 1rem; padding: 1rem; animation: pulse 1.2s infinite; }
    .skeleton-title, .skeleton-company, .skeleton-location, .skeleton-desc, .skeleton-btn { background: rgba(255,255,255,0.15); border-radius: 0.5rem; margin-bottom: 0.5rem; }
    .skeleton-title { height: 1.2rem; width: 70%; }
    .skeleton-company { height: 0.8rem; width: 50%; }
    .skeleton-location { height: 0.8rem; width: 60%; }
    .skeleton-desc { height: 2rem; width: 100%; }
    .skeleton-btn { height: 1.5rem; width: 40%; }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--glass-border); text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 1rem; margin: 0.5rem 0; flex-wrap: wrap; }
    .footer-links a { color: var(--accent); font-size: 0.7rem; text-decoration: none; }
    .copyright { font-size: 0.7rem; color: var(--text-muted); }
    @media (max-width: 640px) {
      .add-link-box { flex-direction: column; align-items: stretch; }
      .links-list { justify-content: center; }
      .controls { flex-direction: column; }
      .search-box, .location-filter select { width: 100%; }
      .job-title { font-size: 0.9rem; }
      .main-header h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="container">
    <div class="main-header">
      <h1>ApplyMore</h1>
      <p>⚡ Your launchpad to an IT career ⚡</p>
    </div>
    <div class="top-bar">
      <div class="theme-controls">
        <button class="theme-btn" id="lightTheme">Light</button>
        <button class="theme-btn" id="darkTheme">Dark</button>
        <button class="theme-btn" id="vibrantTheme">Vibrant</button>
        <div class="accent-picker">
          <label>Accent</label>
          <input type="color" id="accentColor" value="#3b82f6">
        </div>
      </div>
    </div>

    <div class="add-link-box">
      <h3><i class="fas fa-link"></i> Found a job link?</h3>
      <input type="url" id="newLinkInput" placeholder="Paste job URL here...">
      <button id="submitLinkBtn">Add Link</button>
      <div class="links-list">
        <span>📌 Recent:</span>
        <div id="linksList"></div>
      </div>
    </div>

    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search jobs, companies... (e.g., 'fresher')">
      </div>
      <div class="location-filter">
        <select id="locationFilter">
          <option value="all">All Locations</option>
          <option value="Chennai">Chennai</option>
          <option value="Hyderabad">Hyderabad</option>
          <option value="Gurugram">Gurugram</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Pune">Pune</option>
        </select>
      </div>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <div class="skeleton-grid">
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-company"></div><div class="skeleton-location"></div><div class="skeleton-desc"></div><div class="skeleton-btn"></div></div>
        <div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-company"></div><div class="skeleton-location"></div><div class="skeleton-desc"></div><div class="skeleton-btn"></div></div>
      </div>
    </div>

    <footer>
      <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
        <a href="contact.html">Contact</a>
        <a href="#" id="shareTwitter"><i class="fab fa-twitter"></i> Share</a>
        <a href="#" id="shareLinkedin"><i class="fab fa-linkedin"></i> Share</a>
        <a href="#" id="reportIssue">Report Issue</a>
      </div>
      <p>Made with ❤️ by Ram — Helping freshers land their dream job.</p>
      <p class="copyright">© 2026 ApplyMore. Jobs are updated daily from public sources.</p>
    </footer>
  </div>

  <script>
    // --------------------------------------------------------------
    // PARTICLE BACKGROUND (same as before)
    // --------------------------------------------------------------
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let particleCount = window.innerWidth < 768 ? 40 : 80;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.baseColor = `hsl(${Math.random() * 60 + 200}, 80%, 65%)`;
        this.glow = 0;
      }
      update() {
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          const angle = Math.atan2(dy, dx);
          const force = (120 - dist) / 800;
          this.speedX += Math.cos(angle) * force;
          this.speedY += Math.sin(angle) * force;
          this.glow = Math.min(1, (120 - dist) / 100);
        } else {
          this.glow = Math.max(0, this.glow - 0.02);
        }
        this.speedX *= 0.99;
        this.speedY *= 0.99;
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        if (this.glow > 0) {
          ctx.shadowBlur = 12 * this.glow;
          ctx.shadowColor = `rgba(100, 200, 255, ${this.glow})`;
        } else {
          ctx.shadowBlur = 0;
        }
        ctx.fillStyle = this.baseColor;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) particles.push(new Particle());
    }
    initParticles();

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // --------------------------------------------------------------
    // SUPABASE JOBS (no filter, all jobs visible)
    // --------------------------------------------------------------
    const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';

    let allJobs = [];
    let currentOffset = 0;
    const PAGE_SIZE = 20;
    let isLoading = false;
    let hasMore = true;

    function showSkeleton() {
      const container = document.getElementById('jobsContainer');
      container.innerHTML = `
        <div class="skeleton-grid">
          ${Array(4).fill(`
            <div class="skeleton-card">
              <div class="skeleton-title"></div>
              <div class="skeleton-company"></div>
              <div class="skeleton-location"></div>
              <div class="skeleton-desc"></div>
              <div class="skeleton-btn"></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function getJobBadge(createdAt) {
      if (!createdAt) return '';
      const ageHours = (new Date() - new Date(createdAt)) / (1000 * 60 * 60);
      if (ageHours <= 24) return '<span class="new-badge">New</span>';
      if (ageHours <= 30) return '<span class="expiring-badge">Expiring soon</span>';
      return '';
    }

    function isFresherJob(job) {
      const text = (job.title + ' ' + (job.description || '')).toLowerCase();
      return /(fresher|entry level|entry-level|junior|graduate|trainee|0[- ]2 years|less than 2 years|recent graduate|new grad|early career)/i.test(text);
    }

    async function fetchJobs(reset = true) {
      if (isLoading) return;
      isLoading = true;
      if (reset) {
        currentOffset = 0;
        allJobs = [];
        hasMore = true;
        showSkeleton();
      }
      try {
        const url = `${SUPABASE_URL}/rest/v1/ApplyMore?select=*&order=created_at.desc&limit=${PAGE_SIZE}&offset=${currentOffset}`;
        const response = await fetch(url, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (data.length < PAGE_SIZE) hasMore = false;
        if (reset) {
          allJobs = data;
        } else {
          allJobs = [...allJobs, ...data];
        }
        currentOffset += data.length;
        displayJobs();
        if (reset) {
          localStorage.setItem('cachedJobs', JSON.stringify({ timestamp: Date.now(), jobs: allJobs }));
        }
      } catch (err) {
        console.error(err);
        if (reset) {
          const cached = localStorage.getItem('cachedJobs');
          if (cached) {
            const { jobs } = JSON.parse(cached);
            allJobs = jobs;
            displayJobs(true);
            const container = document.getElementById('jobsContainer');
            container.innerHTML += '<div class="no-jobs" style="margin-top:1rem;">⚠️ Using cached jobs. New jobs will appear soon.</div>';
          } else {
            document.getElementById('jobsContainer').innerHTML = '<div class="no-jobs">Failed to load jobs. Please refresh.</div>';
          }
        }
      } finally {
        isLoading = false;
      }
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      return new Date(dateString).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function displayJobs() {
      const container = document.getElementById('jobsContainer');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const selectedLocation = document.getElementById('locationFilter').value;

      let filtered = allJobs;
      if (selectedLocation !== 'all') {
        filtered = filtered.filter(job => job.location && job.location.toLowerCase().includes(selectedLocation.toLowerCase()));
      }
      if (searchTerm) {
        filtered = filtered.filter(job =>
          job.title.toLowerCase().includes(searchTerm) ||
          job.company.toLowerCase().includes(searchTerm) ||
          (job.description && job.description.toLowerCase().includes(searchTerm))
        );
      }

      if (!filtered.length) {
        container.innerHTML = '<div class="no-jobs">No jobs found. Check back later or adjust search/location.</div>';
        return;
      }

      container.innerHTML = filtered.map(job => {
        const cleanDesc = (job.description || '').substring(0, 120);
        const badge = getJobBadge(job.created_at);
        const fresherBadge = isFresherJob(job) ? '<span class="fresher-badge">Fresher</span>' : '';
        return `
          <div class="job-card">
            <div class="job-title">
              ${escapeHtml(job.title)}
              ${badge}
              ${fresherBadge}
            </div>
            <div class="company">${escapeHtml(job.company)}</div>
            <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</div>
            <div class="description">${escapeHtml(cleanDesc)}...</div>
            <div class="deadline">📅 Posted: ${formatDate(job.posted_date || job.created_at)}</div>
            <a href="job.html?id=${job.id}" class="view-details">View Details →</a>
          </div>
        `;
      }).join('');

      if (hasMore && !searchTerm && selectedLocation === 'all') {
        const loadMoreDiv = document.createElement('div');
        loadMoreDiv.id = 'loadMoreTrigger';
        loadMoreDiv.style.textAlign = 'center';
        loadMoreDiv.style.margin = '1rem 0';
        loadMoreDiv.innerHTML = '<button id="loadMoreBtn" style="background: var(--accent); border: none; padding: 0.4rem 1rem; border-radius: 2rem; color: white; cursor: pointer;">Load More Jobs</button>';
        container.appendChild(loadMoreDiv);
        document.getElementById('loadMoreBtn')?.addEventListener('click', () => fetchJobs(false));
      }
    }

    // --------------------------------------------------------------
    // RECOMMENDED LINKS (localStorage)
    // --------------------------------------------------------------
    let recommendedLinks = JSON.parse(localStorage.getItem('recommendedLinks') || '[]');
    function renderLinks() {
      const container = document.getElementById('linksList');
      if (!container) return;
      if (recommendedLinks.length === 0) {
        container.innerHTML = '<span style="color: var(--text-muted);">No links yet. Add one!</span>';
        return;
      }
      container.innerHTML = recommendedLinks.map(link => `<a href="${escapeHtml(link)}" target="_blank">🔗 ${link.length > 30 ? link.substring(0,30)+'...' : link}</a>`).join('');
    }
    function addLink(link) {
      if (!link) return;
      try {
        new URL(link);
        recommendedLinks.unshift(link);
        if (recommendedLinks.length > 8) recommendedLinks.pop();
        localStorage.setItem('recommendedLinks', JSON.stringify(recommendedLinks));
        renderLinks();
        alert('Link added! It will appear at the top for everyone (on this browser).');
      } catch(e) {
        alert('Invalid URL. Please include http:// or https://');
      }
    }
    document.getElementById('submitLinkBtn')?.addEventListener('click', () => {
      const input = document.getElementById('newLinkInput');
      if (input.value.trim()) addLink(input.value.trim());
      input.value = '';
    });
    renderLinks();

    // --------------------------------------------------------------
    // THEME & EVENT LISTENERS
    // --------------------------------------------------------------
    function setTheme(theme) {
      document.body.classList.remove('light', 'dark', 'vibrant');
      document.body.classList.add(theme);
      localStorage.setItem('theme', theme);
    }
    function setAccent(color) {
      document.documentElement.style.setProperty('--accent', color);
      localStorage.setItem('accentColor', color);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);
    const savedAccent = localStorage.getItem('accentColor') || '#3b82f6';
    setAccent(savedAccent);
    document.getElementById('accentColor').value = savedAccent;

    document.getElementById('lightTheme')?.addEventListener('click', () => setTheme('light'));
    document.getElementById('darkTheme')?.addEventListener('click', () => setTheme('dark'));
    document.getElementById('vibrantTheme')?.addEventListener('click', () => setTheme('vibrant'));
    document.getElementById('accentColor')?.addEventListener('input', (e) => setAccent(e.target.value));

    document.getElementById('searchInput')?.addEventListener('input', () => displayJobs());
    document.getElementById('locationFilter')?.addEventListener('change', () => displayJobs());

    document.getElementById('shareTwitter')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://twitter.com/intent/tweet?text=Find IT jobs in India! ${encodeURIComponent(window.location.href)}`, '_blank');
    });
    document.getElementById('shareLinkedin')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(window.location.href)}&title=IT Jobs in India`, '_blank');
    });
    document.getElementById('reportIssue')?.addEventListener('click', (e) => {
      e.preventDefault();
      alert('Please email your issue to support@applymore.com');
    });

    setInterval(() => fetchJobs(true), 5 * 60 * 1000);
    fetchJobs(true);
  </script>
