<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore | The Next Generation of IT Careers</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --accent: #00f2fe; /* Cyber Blue */
      --accent-2: #4facfe;
      --bg: #050505;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-dim: #888888;
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
    }

    body.light {
      --bg: #fafafa;
      --surface: rgba(0, 0, 0, 0.03);
      --border: rgba(0, 0, 0, 0.08);
      --text: #0a0a0a;
      --text-dim: #666666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.6s var(--ease);
    }

    /* === MAGICAL BACKGROUND === */
    .fluid-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(79, 172, 254, 0.15) 0%, transparent 50%);
    }

    .container { max-width: 1300px; margin: 0 auto; padding: 2rem; }

    /* === FLOATING NAV === */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2.5rem; background: var(--surface); backdrop-filter: blur(25px);
      border: 1px solid var(--border); border-radius: 100px;
      position: sticky; top: 1.5rem; z-index: 1000;
    }
    .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.6rem; letter-spacing: -2px; }
    .logo span { color: var(--accent); }

    .nav-actions { display: flex; gap: 1.5rem; align-items: center; }
    #accentColor { appearance: none; width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; background: var(--accent); }

    /* === HERO === */
    .hero { text-align: center; padding: 8rem 0 4rem; }
    .quote-tag {
      font-size: 0.75rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem; display: block;
    }
    .hero h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 800; letter-spacing: -4px; line-height: 0.9; margin-bottom: 2rem; }

    /* === THE COMMAND CENTER (Search & Filter) === */
    .command-center {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 40px; padding: 1rem; margin-bottom: 5rem;
      backdrop-filter: blur(10px); box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }
    .search-row {
      position: relative; display: flex; align-items: center; gap: 1rem; padding: 0.5rem 1rem;
    }
    .search-row i { color: var(--accent); font-size: 1.4rem; }
    .search-row input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 1.2rem; font-weight: 500;
    }
    
    .pill-box {
      display: flex; gap: 0.6rem; overflow-x: auto; padding: 1rem 0.5rem 0.5rem;
      scrollbar-width: none;
    }
    .loc-pill {
      white-space: nowrap; padding: 0.8rem 1.6rem; border-radius: 100px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.4s var(--ease);
    }
    .loc-pill:hover { background: var(--surface); border-color: var(--accent); }
    .loc-pill.active { background: var(--text); color: var(--bg); transform: scale(1.05); }

    /* === JOB GRID (Bento Style) === */
    .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2rem; }
    .job-card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 2.5rem; border-radius: 40px; transition: 0.5s var(--ease);
      position: relative; overflow: hidden; display: flex; flex-direction: column;
    }
    .job-card:hover {
      background: rgba(255,255,255,0.06); transform: translateY(-10px) rotateX(5deg);
      border-color: var(--accent);
    }
    .job-card::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.08) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .job-card:hover::after { opacity: 1; }

    .company-label { font-size: 0.8rem; font-weight: 800; color: var(--accent); margin-bottom: 0.8rem; }
    .job-title { font-size: 1.8rem; font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -1px; }
    
    .meta-tags { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 2.5rem; }
    .tag { padding: 0.4rem 1rem; border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 0.75rem; font-weight: 600; color: var(--text-dim); }

    .apply-trigger {
      margin-top: auto; display: flex; justify-content: space-between; align-items: center;
      text-decoration: none; color: var(--text);
    }
    .apply-trigger .btn-circle {
      width: 50px; height: 50px; border-radius: 50%; background: var(--text); color: var(--bg);
      display: grid; place-items: center; transition: 0.4s var(--ease);
    }
    .apply-trigger:hover .btn-circle { transform: translateX(10px) rotate(-45deg); background: var(--accent); }

    /* === FOOTER === */
    footer { padding: 8rem 0 4rem; text-align: center; }
    .social-links { display: flex; justify-content: center; gap: 3rem; margin-bottom: 2rem; }
    .social-links a { color: var(--text); font-size: 1.5rem; transition: 0.3s; }
    .social-links a:hover { color: var(--accent); transform: scale(1.2); }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .hero h1 { font-size: 4rem; }
      .container { padding: 1rem; }
      .jobs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="fluid-bg"></div>

  <div class="container">
    <nav>
      <div class="logo">APPLY<span>MORE</span></div>
      <div class="nav-actions">
        <input type="color" id="accentColor" value="#00f2fe">
        <i class="fas fa-circle-half-stroke" id="themeToggle" style="cursor: pointer; font-size: 1.2rem;"></i>
      </div>
    </nav>

    <header class="hero">
      <span class="quote-tag" id="quote">Push the boundaries of code</span>
      <h1>Build the<br>Future.</h1>
    </header>

    <div class="command-center">
      <div class="search-row">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <input type="text" id="searchInput" placeholder="Search tech stacks, companies, or roles...">
      </div>
      <div class="pill-box" id="pillBox">
        <div class="loc-pill active" data-loc="all">ALL OPPORTUNITIES</div>
        <div class="loc-pill" data-loc="Hyderabad">HYDERABAD</div>
        <div class="loc-pill" data-loc="Bangalore">BANGALORE</div>
        <div class="loc-pill" data-loc="Mumbai">MUMBAI</div>
        <div class="loc-pill" data-loc="Pune">PUNE</div>
        <div class="loc-pill" data-loc="Chennai">CHENNAI</div>
      </div>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <div style="grid-column: 1/-1; text-align: center; padding: 5rem; opacity: 0.3;">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
      </div>
    </div>

    <footer>
      <div class="social-links">
        <a href="#" id="shareTwitter"><i class="fa-brands fa-twitter"></i></a>
        <a href="#" id="shareLinkedin"><i class="fa-brands fa-linkedin-in"></i></a>
      </div>
      <p style="color: var(--text-dim); font-weight: 600;">Handcrafted for the elite freshers of India.</p>
    </footer>
  </div>

  <script>
    const API_URL = 'https://job-api-xizv.onrender.com/api/jobs';
    let allJobs = [];
    let currentLoc = 'all';

    // Quote Engine
    const quotes = ["Innovate or die", "Code is poetry", "Your first role is your launchpad", "Dream big, code bigger"];
    document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // Fluid Background Effect
    window.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      document.body.style.setProperty('--x', x + '%');
      document.body.style.setProperty('--y', y + '%');
    });

    async function fetchJobs() {
      try {
        const res = await fetch(API_URL);
        allJobs = await res.json();
        displayJobs();
      } catch (err) {
        document.getElementById('jobsContainer').innerHTML = "<p>Critical Error: Connection Interrupted.</p>";
      }
    }

    function displayJobs() {
      const container = document.getElementById('jobsContainer');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = allJobs;
      if (currentLoc !== 'all') {
        filtered = filtered.filter(j => j.location?.toLowerCase().includes(currentLoc.toLowerCase()));
      }
      if (search) {
        filtered = filtered.filter(j => 
          j.title.toLowerCase().includes(search) || j.company.toLowerCase().includes(search)
        );
      }

      container.innerHTML = filtered.map((job, i) => `
        <div class="job-card" onmousemove="this.style.setProperty('--mx', event.offsetX+'px'); this.style.setProperty('--my', event.offsetY+'px')" style="animation: fadeInUp 0.6s var(--ease) forwards ${i * 0.1}s; opacity: 0;">
          <div class="company-label">${escapeHtml(job.company)}</div>
          <div class="job-title">${escapeHtml(job.title)}</div>
          <div class="meta-tags">
            <div class="tag"><i class="fas fa-location-dot"></i> ${escapeHtml(job.location || 'Remote')}</div>
            <div class="tag"><i class="fas fa-calendar"></i> ${job.applicationDeadline ? new Date(job.applicationDeadline).toLocaleDateString() : 'Active'}</div>
          </div>
          <a href="${job.url}" target="_blank" class="apply-trigger">
            <span style="font-weight: 800; font-size: 0.9rem;">VIEW OPPORTUNITY</span>
            <div class="btn-circle"><i class="fas fa-arrow-right"></i></div>
          </a>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      if(!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Logic for Pills
    document.querySelectorAll('.loc-pill').forEach(pill => {
      pill.onclick = () => {
        document.querySelectorAll('.loc-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentLoc = pill.dataset.loc;
        displayJobs();
      };
    });

    document.getElementById('searchInput').oninput = displayJobs;

    // Expert Theme Management
    document.getElementById('themeToggle').onclick = () => {
      document.body.classList.toggle('light');
    };

    document.getElementById('accentColor').oninput = (e) => {
      document.documentElement.style.setProperty('--accent', e.target.value);
    };

    // Socials
    document.getElementById('shareTwitter').onclick = (e) => {
      e.preventDefault();
      window.open(`https://twitter.com/intent/tweet?text=Elevating my career with ApplyMore!`, '_blank');
    };

    fetchJobs();
  </script>
</body>
</html>
