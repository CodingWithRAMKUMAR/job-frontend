<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6599003415562086" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore – India's most trusted IT fresher job platform — real listings, verified companies, daily updates.</title>
  <meta name="description" content="ApplyMore lists IT jobs in India. Filter by experience level: Fresher, 1‑2 years, 3+ years. Free and updated daily.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a2a;
      --glass-bg: rgba(20, 20, 50, 0.65);
      --glass-border: rgba(100, 150, 255, 0.3);
      --text-light: #f0f3ff;
      --text-muted: #a0b0d0;
      --accent: #3b82f6;
      --accent-glow: #5a9eff;
      --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      --transition: all 0.2s ease;
      --input-bg: rgba(10, 10, 40, 0.6);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0a2a, #020218);
      min-height: 100vh;
      color: var(--text-light);
      position: relative;
      overflow-x: hidden;
    }
    body.light {
      background: radial-gradient(circle at 20% 30%, #f8fafc, #eef2f6);
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(0, 0, 0, 0.1);
      --text-light: #1e293b;
      --text-muted: #475569;
      --input-bg: rgba(255, 255, 255, 0.9);
    }
    body.vibrant {
      background: radial-gradient(circle at 20% 30%, #fdf2f8, #fce7f3);
      --glass-bg: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(236, 72, 153, 0.4);
      --text-light: #831843;
      --text-muted: #9d174d;
      --accent: #ec489a;
      --accent-glow: #f472b6;
      --input-bg: rgba(255, 240, 245, 0.9);
    }
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
      backdrop-filter: blur(2px);
    }
    .main-header { text-align: center; margin-bottom: 1.5rem; }
    .main-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, var(--accent), #a855f7); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .main-header p { font-size: 0.9rem; color: var(--text-muted); }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      padding: 0.6rem 1rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid var(--glass-border);
    }
    .theme-controls { display: flex; gap: 0.5rem; align-items: center; }
    .theme-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--text-light);
      transition: var(--transition);
    }
    .theme-btn:hover { background: var(--accent); }
    .accent-picker { display: flex; align-items: center; gap: 0.3rem; }
    .accent-picker label { font-size: 0.7rem; }
    #accentColor { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--glass-border); cursor: pointer; }

    .add-link-box {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--glass-border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
    }
    .add-link-box h3 { font-size: 0.9rem; display: flex; align-items: center; gap: 0.3rem; color: var(--text-light); }
    .add-link-box input { flex: 2; padding: 0.5rem 0.8rem; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 2rem; font-size: 0.8rem; color: var(--text-light); }
    .add-link-box button { background: var(--accent); border: none; padding: 0.5rem 1rem; border-radius: 2rem; color: white; cursor: pointer; font-size: 0.8rem; }
    .links-list { flex: 2; display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
    .links-list span { font-size: 0.7rem; color: var(--text-muted); }
    .links-list a { font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 0.2rem 0.5rem; border-radius: 1rem; color: var(--accent); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

    .controls {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 0.8rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid var(--glass-border);
      align-items: center;
    }
    .search-box { flex: 2; position: relative; }
    .search-box i { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); font-size: 0.8rem; }
    .search-box input { width: 100%; padding: 0.5rem 1rem 0.5rem 2rem; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 2rem; font-size: 0.8rem; color: var(--text-light); }
    .location-filter select {
      padding: 0.5rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .filter-buttons {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-light);
      transition: var(--transition);
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .reset-btn {
      background: var(--accent);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .job-card {
      background: rgba(20, 25, 55, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 1.2rem;
      border: 1px solid rgba(100, 150, 255, 0.2);
      transition: var(--transition);
    }
    .job-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .job-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.3rem; display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .company { color: var(--accent); font-weight: 500; margin-bottom: 0.3rem; }
    .location { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .description { font-size: 0.8rem; color: #cbd5e6; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .exp-tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      color: white;
      white-space: nowrap;
    }
    .exp-tag.fresher { background: #8b5cf6; }
    .exp-tag.mid { background: #f59e0b; }
    .exp-tag.senior { background: #ef4444; }
    .view-details {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.8rem;
    }
    .empty-message {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      background: rgba(20,25,55,0.5);
      border-radius: 1rem;
    }
    footer { text-align: center; margin-top: 3rem; color: var(--text-muted); font-size: 0.8rem; }
    .footer-links { display: flex; justify-content: center; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
    .footer-links a { color: var(--accent); text-decoration: none; }
    @media (max-width: 640px) {
      .add-link-box, .controls { flex-direction: column; align-items: stretch; }
      .search-box, .location-filter select, .filter-buttons, .reset-btn { width: 100%; }
      .filter-buttons { justify-content: center; }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="container">
    <div class="main-header">
      <h1>ApplyMore</h1>
      <p>⚡ Apply more. Get hired faster.⚡</p>
    </div>
    <div class="top-bar">
      <div class="theme-controls">
        <button class="theme-btn" id="lightTheme">Light</button>
        <button class="theme-btn" id="darkTheme">Dark</button>
        <button class="theme-btn" id="vibrantTheme">Vibrant</button>
        <div class="accent-picker">
          <label>Accent</label>
          <input type="color" id="accentColor" value="#3b82f6">
        </div>
      </div>
    </div>

    <div class="add-link-box">
      <h3><i class="fas fa-link"></i> Found a job link?</h3>
      <input type="url" id="newLinkInput" placeholder="Paste job URL here...">
      <button id="submitLinkBtn">Add Link</button>
      <div class="links-list">
        <span>📌 Recent:</span>
        <div id="linksList"></div>
      </div>
    </div>

    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search jobs, companies...">
      </div>
      <div class="location-filter">
        <select id="locationFilter">
          <option value="all">All Locations</option>
          <option value="Chennai">Chennai</option>
          <option value="Hyderabad">Hyderabad</option>
          <option value="Gurugram">Gurugram</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Pune">Pune</option>
        </select>
      </div>
      <div class="filter-buttons">
        <button data-filter="all" class="filter-btn">All Jobs</button>
        <button data-filter="fresher" class="filter-btn active">Fresher (0 yrs)</button>
        <button data-filter="mid" class="filter-btn">1‑2 years</button>
        <button data-filter="senior" class="filter-btn">3+ years</button>
      </div>
      <button id="resetFiltersBtn" class="reset-btn">Reset Filters</button>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <div class="empty-message">Loading jobs...</div>
    </div>

    <footer>
      <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
        <a href="contact.html">Contact</a>
        <a href="#" id="shareTwitter"><i class="fab fa-twitter"></i> Share</a>
        <a href="#" id="shareLinkedin"><i class="fab fa-linkedin"></i> Share</a>
        <a href="#" id="reportIssue">Report Issue</a>
      </div>
      <p>Made with ❤️ by Ram — Helping freshers land their dream job.</p>
      <p class="copyright">© 2026 ApplyMore. Jobs are updated daily from public sources.</p>
    </footer>
  </div>

  <script>
    // --------------------------------------------------------------
    // PARTICLE BACKGROUND
    // --------------------------------------------------------------
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let particleCount = window.innerWidth < 768 ? 40 : 80;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
        this.baseColor = `hsl(${Math.random() * 60 + 200}, 80%, 65%)`;
        this.glow = 0;
      }
      update() {
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          const angle = Math.atan2(dy, dx);
          const force = (120 - dist) / 800;
          this.speedX += Math.cos(angle) * force;
          this.speedY += Math.sin(angle) * force;
          this.glow = Math.min(1, (120 - dist) / 100);
        } else {
          this.glow = Math.max(0, this.glow - 0.02);
        }
        this.speedX *= 0.99;
        this.speedY *= 0.99;
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        if (this.glow > 0) {
          ctx.shadowBlur = 12 * this.glow;
          ctx.shadowColor = `rgba(100, 200, 255, ${this.glow})`;
        } else {
          ctx.shadowBlur = 0;
        }
        ctx.fillStyle = this.baseColor;
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) particles.push(new Particle());
    }
    initParticles();

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // --------------------------------------------------------------
    // SUPABASE & STRICT CLASSIFICATION
    // --------------------------------------------------------------
    const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';

    let allJobs = [];
    let currentFilter = 'fresher'; // default to fresher

    // Strict experience level determination
    function getExperienceLevel(job) {
      const text = (job.title + ' ' + (job.description || '')).toLowerCase();
      
      // Senior keywords (immediate senior)
      const seniorKeywords = ['senior', 'lead', 'principal', 'architect', 'manager', 'director', 'head', 'staff engineer', 'distinguished'];
      for (let kw of seniorKeywords) {
        if (text.includes(kw)) return 'senior';
      }
      
      // Numeric years
      const yearPattern = /(\d+(?:\.\d+)?)\s*[-+]?\s*(?:\d+(?:\.\d+)?)?\s*years?/i;
      const match = text.match(yearPattern);
      if (match) {
        let years = parseFloat(match[1]);
        if (years >= 3) return 'senior';
        if (years >= 1) return 'mid';
      }
      
      // Fresher keywords
      const fresherKeywords = ['fresher', 'entry level', 'entry-level', 'junior', 'graduate', 'trainee', 'recent graduate', 'new grad', 'early career', '0 years', 'zero years', 'no experience'];
      for (let kw of fresherKeywords) {
        if (text.includes(kw)) return 'fresher';
      }
      
      // Default to mid (1-2 years)
      return 'mid';
    }

    async function fetchJobs() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?select=*&order=created_at.desc`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        allJobs = await response.json();
        displayJobs();
      } catch (err) {
        console.error(err);
        document.getElementById('jobsContainer').innerHTML = '<div class="empty-message">Failed to load jobs. Please refresh.</div>';
      }
    }

    function displayJobs() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      const selectedLocation = document.getElementById('locationFilter').value;

      let filtered = allJobs;
      if (selectedLocation !== 'all') {
        filtered = filtered.filter(job => job.location && job.location.toLowerCase().includes(selectedLocation.toLowerCase()));
      }
      if (searchTerm) {
        filtered = filtered.filter(job =>
          job.title.toLowerCase().includes(searchTerm) ||
          job.company.toLowerCase().includes(searchTerm) ||
          (job.description && job.description.toLowerCase().includes(searchTerm))
        );
      }

      // Apply experience filter if not "all"
      if (currentFilter !== 'all') {
        filtered = filtered.filter(job => getExperienceLevel(job) === currentFilter);
      } else {
        // For "All Jobs", sort fresher jobs to the top, then mid, then senior
        filtered.sort((a, b) => {
          const order = { 'fresher': 1, 'mid': 2, 'senior': 3 };
          const levelA = getExperienceLevel(a);
          const levelB = getExperienceLevel(b);
          return order[levelA] - order[levelB];
        });
      }

      const container = document.getElementById('jobsContainer');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-message">No jobs found. Try different filters.</div>';
        return;
      }

      container.innerHTML = filtered.map(job => {
        const level = getExperienceLevel(job);
        let tagText = level === 'fresher' ? 'Fresher (0 yrs)' : (level === 'mid' ? '1-2 years' : '3+ years');
        return `
          <div class="job-card">
            <div class="job-title">
              ${escapeHtml(job.title)}
              <span class="exp-tag ${level}">${tagText}</span>
            </div>
            <div class="company">${escapeHtml(job.company)}</div>
            <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</div>
            <div class="description">${escapeHtml((job.description || '').substring(0, 120))}...</div>
            <div class="deadline">📅 Posted: ${formatDate(job.posted_date || job.created_at)}</div>
            <a href="job.html?id=${job.id}" class="view-details">View Details →</a>
          </div>
        `;
      }).join('');
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      return new Date(dateString).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Filter UI handlers
    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.getAttribute('data-filter') === filter) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      displayJobs();
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('locationFilter').value = 'all';
      setFilter('fresher'); // reset to default fresher
    }

    // --------------------------------------------------------------
    // RECOMMENDED LINKS (localStorage)
    // --------------------------------------------------------------
    let recommendedLinks = JSON.parse(localStorage.getItem('recommendedLinks') || '[]');
    function renderLinks() {
      const container = document.getElementById('linksList');
      if (!container) return;
      if (recommendedLinks.length === 0) {
        container.innerHTML = '<span style="color: var(--text-muted);">No links yet. Add one!</span>';
        return;
      }
      container.innerHTML = recommendedLinks.map(link => `<a href="${escapeHtml(link)}" target="_blank">🔗 ${link.length > 30 ? link.substring(0,30)+'...' : link}</a>`).join('');
    }
    function addLink(link) {
      if (!link) return;
      try {
        new URL(link);
        recommendedLinks.unshift(link);
        if (recommendedLinks.length > 8) recommendedLinks.pop();
        localStorage.setItem('recommendedLinks', JSON.stringify(recommendedLinks));
        renderLinks();
        alert('Link added! It will appear at the top for everyone (on this browser).');
      } catch(e) {
        alert('Invalid URL. Please include http:// or https://');
      }
    }
    document.getElementById('submitLinkBtn')?.addEventListener('click', () => {
      const input = document.getElementById('newLinkInput');
      if (input.value.trim()) addLink(input.value.trim());
      input.value = '';
    });
    renderLinks();

    // --------------------------------------------------------------
    // THEME & EVENT LISTENERS
    // --------------------------------------------------------------
    function setTheme(theme) {
      document.body.classList.remove('light', 'dark', 'vibrant');
      document.body.classList.add(theme);
      localStorage.setItem('theme', theme);
    }
    function setAccent(color) {
      document.documentElement.style.setProperty('--accent', color);
      localStorage.setItem('accentColor', color);
    }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);
    const savedAccent = localStorage.getItem('accentColor') || '#3b82f6';
    setAccent(savedAccent);
    document.getElementById('accentColor').value = savedAccent;

    document.getElementById('lightTheme')?.addEventListener('click', () => setTheme('light'));
    document.getElementById('darkTheme')?.addEventListener('click', () => setTheme('dark'));
    document.getElementById('vibrantTheme')?.addEventListener('click', () => setTheme('vibrant'));
    document.getElementById('accentColor')?.addEventListener('input', (e) => setAccent(e.target.value));

    document.getElementById('searchInput')?.addEventListener('input', displayJobs);
    document.getElementById('locationFilter')?.addEventListener('change', displayJobs);
    document.getElementById('resetFiltersBtn')?.addEventListener('click', resetFilters);

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filter = e.currentTarget.getAttribute('data-filter');
        setFilter(filter);
      });
    });

    document.getElementById('shareTwitter')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://twitter.com/intent/tweet?text=Find IT jobs in India! ${encodeURIComponent(window.location.href)}`, '_blank');
    });
    document.getElementById('shareLinkedin')?.addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(window.location.href)}&title=IT Jobs in India`, '_blank');
    });
    document.getElementById('reportIssue')?.addEventListener('click', (e) => {
      e.preventDefault();
      alert('Please email your issue to support@applymore.com');
    });

    fetchJobs();
    setInterval(fetchJobs, 5 * 60 * 1000);
  </script>
</body>
</html>
