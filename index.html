<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobBoard – Find Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0a0f2a 0%, #030618 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #f0f6ff;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #ffb347, #ff6b6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .job-card {
      background: rgba(20, 25, 50, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 1rem;
      transition: all 0.2s;
    }
    .job-card:hover {
      transform: translateY(-3px);
      border-color: #ffb347;
    }
    .job-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .company {
      color: #ffb347;
      margin-bottom: 0.3rem;
    }
    .location {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 0.5rem;
    }
    .description {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .job-link {
      display: inline-block;
      background: linear-gradient(105deg, #ff6b6b, #ffb347);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      text-decoration: none;
      color: white;
      font-size: 0.8rem;
    }
    .loading {
      text-align: center;
      margin-top: 2rem;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>JobBoard ✦</h1>
  <p>Fresh jobs from around the web, updated automatically.</p>
  <div id="jobsContainer" class="jobs-grid">
    <div class="loading">Loading jobs...</div>
  </div>
  <footer>Powered by automatic job scraping • New jobs added every few hours</footer>
</div>

<script>
  // Replace this URL with your actual Render backend URL
  const API_URL = 'https://job-api-xizv.onrender.com/api/jobs';

  async function fetchJobs() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const jobs = await res.json();
      displayJobs(jobs);
    } catch (err) {
      console.error(err);
      document.getElementById('jobsContainer').innerHTML = '<div class="loading">Failed to load jobs. Check console for details.</div>';
    }
  }

  function displayJobs(jobs) {
    const container = document.getElementById('jobsContainer');
    if (!jobs.length) {
      container.innerHTML = '<div class="loading">No jobs yet. Check back soon!</div>';
      return;
    }
    container.innerHTML = jobs.map(job => `
      <div class="job-card">
        <div class="job-title">${escapeHtml(job.title)}</div>
        <div class="company">${escapeHtml(job.company)}</div>
        <div class="location">${escapeHtml(job.location || 'Location not specified')}</div>
        <div class="description">${escapeHtml(job.description ? job.description.substring(0, 150) : '')}...</div>
        <a href="${escapeHtml(job.url)}" target="_blank" class="job-link">View Job →</a>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  fetchJobs();
</script>
</body>
</html>
