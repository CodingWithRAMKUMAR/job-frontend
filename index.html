<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobBoard – Find Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0a0f2a 0%, #030618 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #f0f6ff;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #ffb347, #ff6b6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    .filters {
      margin: 1rem 0;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .filters select, .filters input {
      background: rgba(20, 25, 50, 0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      color: white;
      font-size: 0.9rem;
    }
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .job-card {
      background: rgba(20, 25, 50, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1rem;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 1rem;
      transition: all 0.2s;
    }
    .job-card:hover {
      transform: translateY(-3px);
      border-color: #ffb347;
    }
    .job-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .company {
      color: #ffb347;
      margin-bottom: 0.3rem;
    }
    .location {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 0.5rem;
    }
    .description {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .job-link {
      display: inline-block;
      background: linear-gradient(105deg, #ff6b6b, #ffb347);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      text-decoration: none;
      color: white;
      font-size: 0.8rem;
    }
    .loading {
      text-align: center;
      margin-top: 2rem;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>JobBoard ✦</h1>
  <p>Fresh jobs from around the web, updated automatically.</p>
  <div class="filters">
    <label for="locationFilter">Filter by location:</label>
    <select id="locationFilter">
      <option value="all">All India</option>
      <option value="Hyderabad">Hyderabad</option>
      <option value="Bangalore">Bangalore</option>
      <option value="Mumbai">Mumbai</option>
      <option value="Delhi">Delhi</option>
      <option value="Chennai">Chennai</option>
      <option value="Pune">Pune</option>
      <option value="Kolkata">Kolkata</option>
      <option value="Ahmedabad">Ahmedabad</option>
      <option value="India">India (nationwide)</option>
    </select>
  </div>
  <div id="jobsContainer" class="jobs-grid">
    <div class="loading">Loading jobs...</div>
  </div>
  <footer>Powered by automatic job scraping • New jobs added every few hours</footer>
</div>

<script>
  const API_URL = 'https://job-api-xizv.onrender.com/api/jobs';
  let allJobs = [];

  async function fetchJobs() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allJobs = await res.json();
      displayJobs();
    } catch (err) {
      console.error(err);
      document.getElementById('jobsContainer').innerHTML = '<div class="loading">Failed to load jobs. Check console for details.</div>';
    }
  }

  function stripHtml(html) {
    if (!html) return '';
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function displayJobs() {
    const container = document.getElementById('jobsContainer');
    const selectedLocation = document.getElementById('locationFilter').value;
    let filtered = allJobs;
    if (selectedLocation !== 'all') {
      filtered = allJobs.filter(job => job.location && job.location.toLowerCase().includes(selectedLocation.toLowerCase()));
    }
    if (!filtered.length) {
      container.innerHTML = '<div class="loading">No jobs found for this location.</div>';
      return;
    }
    container.innerHTML = filtered.map(job => {
      const cleanDesc = stripHtml(job.description).substring(0, 200);
      return `
        <div class="job-card">
          <div class="job-title">${escapeHtml(job.title)}</div>
          <div class="company">${escapeHtml(job.company)}</div>
          <div class="location">${escapeHtml(job.location || 'Location not specified')}</div>
          <div class="description">${escapeHtml(cleanDesc)}...</div>
          <a href="${escapeHtml(job.url)}" target="_blank" class="job-link">View Job →</a>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  document.getElementById('locationFilter').addEventListener('change', () => displayJobs());
  fetchJobs();
</script>
</body>
</html>
