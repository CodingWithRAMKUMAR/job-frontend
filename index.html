<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore | Dream IT Jobs</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --bg: #020617;
      --glass: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --card-radius: 24px;
    }

    body.light {
      --bg: #f1f5f9;
      --glass: rgba(255, 255, 255, 0.7);
      --text: #0f172a;
      --text-muted: #64748b;
      --glass-border: rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.4s ease;
      overflow-x: hidden;
    }

    /* === ANIMATED MESH BACKGROUND === */
    .mesh-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background: radial-gradient(at 0% 0%, var(--accent-glow) 0, transparent 50%),
                  radial-gradient(at 100% 100%, var(--accent-glow) 0, transparent 50%);
      opacity: 0.5;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    /* === NAVBAR === */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem; background: var(--glass); backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border); border-radius: 20px;
      position: sticky; top: 1.5rem; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }

    .controls-right { display: flex; gap: 1rem; align-items: center; }
    .theme-toggle {
      width: 35px; height: 35px; border-radius: 10px; background: var(--bg);
      border: 1px solid var(--glass-border); color: var(--text); cursor: pointer;
      display: grid; place-items: center; transition: 0.3s;
    }
    .theme-toggle:hover { transform: rotate(15deg) scale(1.1); color: var(--accent); }

    /* === QUOTE SECTION === */
    .quote-box {
      text-align: center; margin: 4rem 0 2rem; padding: 0 1rem;
    }
    #dailyQuote {
      font-size: 0.9rem; font-weight: 600; color: var(--accent);
      text-transform: uppercase; letter-spacing: 2px;
      animation: fadeIn 1.5s ease;
    }

    .hero-text { text-align: center; margin-bottom: 3rem; }
    .hero-text h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; line-height: 1.1; margin-bottom: 1rem; }
    .hero-text span { background: linear-gradient(to right, var(--accent), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* === FILTER & SEARCH SYSTEM === */
    .action-panel {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 30px; padding: 1.5rem; margin-bottom: 3rem;
    }
    .search-input-wrap {
      position: relative; margin-bottom: 1.5rem;
    }
    .search-input-wrap i { position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); color: var(--accent); }
    .search-input-wrap input {
      width: 100%; padding: 1.2rem 1.2rem 1.2rem 3.5rem; border-radius: 18px;
      background: rgba(0,0,0,0.1); border: 1px solid var(--glass-border);
      color: var(--text); outline: none; font-size: 1rem; transition: 0.3s;
    }
    .search-input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

    .pill-container {
      display: flex; gap: 0.6rem; overflow-x: auto; scrollbar-width: none;
      padding-bottom: 0.5rem;
    }
    .pill-container::-webkit-scrollbar { display: none; }
    .loc-pill {
      white-space: nowrap; padding: 0.7rem 1.4rem; border-radius: 100px;
      background: var(--bg); border: 1px solid var(--glass-border);
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.3s;
      color: var(--text-muted);
    }
    .loc-pill.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }

    /* === JOB CARDS === */
    .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .job-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      padding: 1.8rem; border-radius: var(--card-radius); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }
    .job-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent);
    }
    .job-card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(255,255,255,0.05); }

    .company { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; }
    .title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; }
    .meta { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    
    .apply-btn {
      margin-top: auto; background: var(--accent); color: white; padding: 0.9rem;
      border-radius: 14px; text-decoration: none; text-align: center;
      font-weight: 800; font-size: 0.9rem; transition: 0.3s;
    }
    .apply-btn:hover { box-shadow: 0 10px 20px var(--accent-glow); transform: translateY(-2px); }

    /* === FOOTER & SOCIAL === */
    .footer { text-align: center; margin-top: 5rem; padding: 3rem 0; border-top: 1px solid var(--glass-border); }
    .social-btns { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.5rem; }
    .social-btns a {
      color: var(--text-muted); font-size: 1.2rem; transition: 0.3s;
    }
    .social-btns a:hover { color: var(--accent); transform: translateY(-3px); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .hero-text h1 { font-size: 2.2rem; }
      .action-panel { padding: 1rem; }
    }
  </style>
</head>
<body class="dark">
  <div class="mesh-bg"></div>

  <div class="container">
    <nav class="nav">
      <div class="logo">ApplyMore</div>
      <div class="controls-right">
        <input type="color" id="accentColor" value="#6366f1" style="width: 25px; height: 25px; border: none; background: none; cursor: pointer;">
        <button class="theme-toggle" id="themeBtn"><i class="fas fa-moon"></i></button>
      </div>
    </nav>

    <div class="quote-box">
      <p id="dailyQuote">Fetching inspiration...</p>
    </div>

    <header class="hero-text">
      <h1>Your Career. <br><span>Accelerated.</span></h1>
    </header>

    <div class="action-panel">
      <div class="search-input-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search tech stacks, companies, or roles...">
      </div>
      <div class="pill-container" id="pillBox">
        <div class="loc-pill active" data-loc="all">All India</div>
        <div class="loc-pill" data-loc="Hyderabad">Hyderabad</div>
        <div class="loc-pill" data-loc="Bangalore">Bangalore</div>
        <div class="loc-pill" data-loc="Mumbai">Mumbai</div>
        <div class="loc-pill" data-loc="Pune">Pune</div>
        <div class="loc-pill" data-loc="Chennai">Chennai</div>
        <div class="loc-pill" data-loc="Delhi">Delhi</div>
      </div>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
        <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--accent)"></i>
      </div>
    </div>

    <footer class="footer">
      <div class="social-btns">
        <a href="#" id="shareTwitter"><i class="fab fa-twitter"></i></a>
        <a href="#" id="shareLinkedin"><i class="fab fa-linkedin-in"></i></a>
      </div>
      <p style="color: var(--text-muted); font-size: 0.85rem;">Made by Ram • Helping freshers build the future.</p>
    </footer>
  </div>

  <script>
    const API_URL = 'https://job-api-xizv.onrender.com/api/jobs';
    let allJobs = [];
    let activeLoc = 'all';

    const quotes = [
      "The best way to predict the future is to create it.",
      "Your dream job is just one application away.",
      "Stay hungry, stay foolish.",
      "Code is your superpower.",
      "Built for the next generation of Indian Engineers."
    ];

    // Quote Logic
    document.getElementById('dailyQuote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    // Fetch Jobs
    async function fetchJobs() {
      try {
        const res = await fetch(API_URL);
        allJobs = await res.json();
        displayJobs();
      } catch (err) {
        document.getElementById('jobsContainer').innerHTML = "<p>Systems offline. Please refresh.</p>";
      }
    }

    function displayJobs() {
      const container = document.getElementById('jobsContainer');
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = allJobs;
      if (activeLoc !== 'all') {
        filtered = filtered.filter(j => j.location?.toLowerCase().includes(activeLoc.toLowerCase()));
      }
      if (search) {
        filtered = filtered.filter(j => 
          j.title.toLowerCase().includes(search) || j.company.toLowerCase().includes(search)
        );
      }

      if (filtered.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">No matches found in this sector.</p>';
        return;
      }

      container.innerHTML = filtered.map((job, i) => `
        <div class="job-card" style="animation: fadeIn 0.4s ease forwards ${i * 0.05}s; opacity: 0;">
          <div class="company">${escapeHtml(job.company)}</div>
          <div class="title">${escapeHtml(job.title)}</div>
          <div class="meta">
            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'India')}</span>
            ${job.applicationDeadline ? `<span><i class="far fa-clock"></i> ${new Date(job.applicationDeadline).toLocaleDateString()}</span>` : ''}
          </div>
          <a href="${job.url}" target="_blank" class="apply-btn">Apply Direct</a>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      if(!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Interactions
    document.querySelectorAll('.loc-pill').forEach(pill => {
      pill.onclick = () => {
        document.querySelectorAll('.loc-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        activeLoc = pill.dataset.loc;
        displayJobs();
      };
    });

    document.getElementById('searchInput').oninput = displayJobs;

    // Theme & Color
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.onclick = () => {
      const isDark = document.body.classList.toggle('light');
      themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    };

    document.getElementById('accentColor').oninput = (e) => {
      document.documentElement.style.setProperty('--accent', e.target.value);
      document.documentElement.style.setProperty('--accent-glow', e.target.value + '44');
    };

    // Social Logic
    document.getElementById('shareTwitter').onclick = (e) => {
      e.preventDefault();
      window.open(`https://twitter.com/intent/tweet?text=Landing my first IT job with ApplyMore! ${encodeURIComponent(window.location.href)}`, '_blank');
    };

    document.getElementById('shareLinkedin').onclick = (e) => {
      e.preventDefault();
      window.open(`https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(window.location.href)}`, '_blank');
    };

    fetchJobs();
  </script>
</body>
</html>
