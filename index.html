<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6599003415562086" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore – Futuristic IT Fresher Jobs</title>
  <meta name="description" content="ApplyMore finds the latest IT fresher jobs across India. Search, filter by location, and apply directly to company websites. Free and updated daily.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0a0a2a;
      --glass-bg: rgba(20, 20, 50, 0.65);
      --glass-border: rgba(100, 150, 255, 0.3);
      --text-light: #f0f3ff;
      --text-muted: #a0b0d0;
      --accent: #3b82f6;
      --accent-glow: #5a9eff;
      --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      --transition: all 0.25s ease;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 20% 30%, #0a0a2a, #020218);
      min-height: 100vh;
      color: var(--text-light);
      position: relative;
      overflow-x: hidden;
    }

    /* Canvas background - futuristic particles */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Main container - glassmorphism */
    .container {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(2px);
    }

    /* Glass card for top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1rem 1.5rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .logo h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .theme-controls {
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }

    .theme-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-light);
      transition: var(--transition);
    }
    .theme-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .accent-picker {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .accent-picker label {
      font-size: 0.8rem;
    }
    #accentColor {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--glass-border);
      cursor: pointer;
      background: var(--accent);
    }

    .hero {
      text-align: center;
      margin: 2rem 0 3rem;
    }
    .hero .tagline {
      display: inline-block;
      background: rgba(59,130,246,0.2);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(59,130,246,0.4);
      margin-bottom: 1rem;
    }
    .hero p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 700px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 1rem 1.5rem;
      border-radius: 2rem;
      border: 1px solid var(--glass-border);
    }
    .search-box {
      flex: 2;
      position: relative;
    }
    .search-box i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .search-box input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.5rem;
      background: rgba(10,10,40,0.6);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      font-size: 0.9rem;
      color: var(--text-light);
      outline: none;
      transition: var(--transition);
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .location-filter select {
      padding: 0.8rem 2rem 0.8rem 1rem;
      background: rgba(10,10,40,0.6);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      color: var(--text-light);
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* Jobs grid */
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }

    /* Glass job card */
    .job-card {
      background: rgba(20, 25, 55, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid rgba(100, 150, 255, 0.2);
      transition: var(--transition);
      animation: fadeInUp 0.4s ease;
    }
    .job-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
      background: rgba(30, 35, 70, 0.8);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .job-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .company {
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.3rem;
    }
    .location {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .description {
      font-size: 0.85rem;
      color: #cbd5e6;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .deadline {
      font-size: 0.75rem;
      background: rgba(220,38,38,0.2);
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }
    .view-details {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: var(--transition);
    }
    .view-details:hover {
      background: var(--accent-glow);
      box-shadow: 0 0 8px var(--accent);
    }

    /* Skeleton loaders */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .skeleton-card {
      background: rgba(30,35,70,0.5);
      backdrop-filter: blur(4px);
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid rgba(100,150,255,0.1);
      animation: pulse 1.5s infinite;
    }
    .skeleton-title, .skeleton-company, .skeleton-location, .skeleton-desc, .skeleton-btn {
      background: rgba(255,255,255,0.1);
      border-radius: 0.5rem;
      margin-bottom: 0.8rem;
    }
    .skeleton-title { height: 1.5rem; width: 70%; }
    .skeleton-company { height: 1rem; width: 50%; }
    .skeleton-location { height: 1rem; width: 60%; }
    .skeleton-desc { height: 3rem; width: 100%; }
    .skeleton-btn { height: 2rem; width: 40%; }
    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 0.8; }
      100% { opacity: 0.4; }
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--glass-border);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 1rem 0;
    }
    .footer-links a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
    @media (max-width: 640px) {
      .container { padding: 1rem; }
      .controls { flex-direction: column; }
      .search-box, .location-filter select { width: 100%; }
    }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>
  <div class="container">
    <div class="top-bar">
      <div class="logo"><h1>ApplyMore</h1></div>
      <div class="theme-controls">
        <button class="theme-btn" id="lightTheme">Light</button>
        <button class="theme-btn" id="darkTheme">Dark</button>
        <button class="theme-btn" id="vibrantTheme">Vibrant</button>
        <div class="accent-picker">
          <label>Accent</label>
          <input type="color" id="accentColor" value="#3b82f6">
        </div>
      </div>
    </div>
    <div class="hero">
      <div class="tagline">🚀 Launch your career in IT</div>
      <p>Handpicked entry‑level IT jobs across India. Apply before deadlines and start your journey.</p>
    </div>
    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search jobs, companies, skills...">
      </div>
      <div class="location-filter">
        <select id="locationFilter">
          <option value="all">All Locations</option>
          <option value="Hyderabad">Hyderabad</option>
          <option value="Bangalore">Bangalore</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Delhi">Delhi</option>
          <option value="Chennai">Chennai</option>
          <option value="Pune">Pune</option>
          <option value="Kolkata">Kolkata</option>
          <option value="Ahmedabad">Ahmedabad</option>
        </select>
      </div>
    </div>
    <div id="jobsContainer" class="jobs-grid">
      <!-- skeleton will appear here -->
    </div>
    <footer>
      <div class="footer-links">
        <a href="#" id="shareTwitter"><i class="fab fa-twitter"></i> Share on Twitter</a>
        <a href="#" id="shareLinkedin"><i class="fab fa-linkedin"></i> Share on LinkedIn</a>
      </div>
      <p>Made with ❤️ by Ram — Helping freshers land their dream job.</p>
      <p class="copyright">© 2026 ApplyMore. Jobs are updated every 12 hours.</p>
    </footer>
  </div>

  <script>
    // --------------------------------------------------------------
    // 1. FUTURISTIC PARTICLE BACKGROUND
    // --------------------------------------------------------------
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let mouseX = 0, mouseY = 0;
    let particleCount = 120;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.5 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.6;
        this.speedY = (Math.random() - 0.5) * 0.6;
        this.color = `hsl(${Math.random() * 60 + 200}, 80%, 65%)`;
      }
      update() {
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          const angle = Math.atan2(dy, dx);
          const force = (120 - dist) / 800;
          this.speedX += Math.cos(angle) * force;
          this.speedY += Math.sin(angle) * force;
        }
        this.speedX *= 0.99;
        this.speedY *= 0.99;
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        // draw connections
        for (let p of particles) {
          const dx = this.x - p.x;
          const dy = this.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 110 && dist > 5) {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(p.x, p.y);
            ctx.strokeStyle = `rgba(100, 150, 255, ${0.15 * (1 - dist / 110)})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) particles.push(new Particle());
    }
    initParticles();

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // --------------------------------------------------------------
    // 2. SUPABASE FETCH WITH SKELETON, CACHE, AND AUTO-REFRESH
    // --------------------------------------------------------------
    const SUPABASE_URL = 'https://qmljqckhhdmvcbomydhf.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_rmCQIW6Lw90zleW-lYZcFw_WZrcHw4h';

    let allJobs = [];
    let refreshInterval = null;

    function showSkeleton() {
      const container = document.getElementById('jobsContainer');
      container.innerHTML = `
        <div class="skeleton-grid">
          ${Array(8).fill(`
            <div class="skeleton-card">
              <div class="skeleton-title"></div>
              <div class="skeleton-company"></div>
              <div class="skeleton-location"></div>
              <div class="skeleton-desc"></div>
              <div class="skeleton-btn"></div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function isNewJob(createdAt) {
      if (!createdAt) return false;
      const diffHours = (new Date() - new Date(createdAt)) / (1000 * 60 * 60);
      return diffHours <= 24;
    }

    async function fetchJobs(showLoader = true) {
      if (showLoader) showSkeleton();
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/ApplyMore?select=*&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        // Cache for 10 minutes
        localStorage.setItem('cachedJobs', JSON.stringify({ timestamp: Date.now(), jobs: data }));
        allJobs = data.map(job => ({
          _id: job.id,
          title: job.title,
          company: job.company,
          location: job.location,
          description: job.description,
          posted_date: job.posted_date,
          created_at: job.created_at,
          url: job.url
        }));
        displayJobs();
      } catch (err) {
        console.error(err);
        const cached = localStorage.getItem('cachedJobs');
        if (cached) {
          const { jobs } = JSON.parse(cached);
          allJobs = jobs;
          displayJobs(true);
          document.getElementById('jobsContainer').innerHTML = '<div class="no-jobs">Using cached jobs. New jobs will appear soon.</div>';
        } else {
          document.getElementById('jobsContainer').innerHTML = '<div class="no-jobs">Failed to load jobs. Please refresh.</div>';
        }
      }
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      return new Date(dateString).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function displayJobs(fromCache = false) {
      const container = document.getElementById('jobsContainer');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const selectedLocation = document.getElementById('locationFilter').value;

      let filtered = allJobs;
      if (selectedLocation !== 'all') {
        filtered = filtered.filter(job => job.location && job.location.toLowerCase().includes(selectedLocation.toLowerCase()));
      }
      if (searchTerm) {
        filtered = filtered.filter(job =>
          job.title.toLowerCase().includes(searchTerm) ||
          job.company.toLowerCase().includes(searchTerm) ||
          (job.description && job.description.toLowerCase().includes(searchTerm))
        );
      }

      if (!filtered.length) {
        container.innerHTML = '<div class="no-jobs">No jobs found. Check back soon!</div>';
        return;
      }

      container.innerHTML = filtered.map(job => {
        const cleanDesc = (job.description || '').substring(0, 200);
        const newBadge = isNewJob(job.created_at) ? '<span style="background:#22c55e; font-size:0.7rem; padding:0.2rem 0.5rem; border-radius:1rem;">New</span>' : '';
        return `
          <div class="job-card">
            <div class="job-title">
              ${escapeHtml(job.title)}
              ${newBadge}
            </div>
            <div class="company">${escapeHtml(job.company)}</div>
            <div class="location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Not specified')}</div>
            <div class="description">${escapeHtml(cleanDesc)}...</div>
            <div class="deadline">📅 Posted: ${formatDate(job.posted_date || job.created_at)}</div>
            <a href="${escapeHtml(job.url)}" target="_blank" class="view-details">Apply →</a>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Theme / accent (same as before)
    function setTheme(theme) {
      document.body.classList.remove('light', 'dark', 'vibrant');
      document.body.classList.add(theme);
      localStorage.setItem('theme', theme);
    }
    function setAccent(color) {
      document.documentElement.style.setProperty('--accent', color);
      let r,g,b;
      if (color.startsWith('#')) {
        r = parseInt(color.slice(1,3),16);
        g = parseInt(color.slice(3,5),16);
        b = parseInt(color.slice(5,7),16);
      } else {
        r=59; g=130; b=246;
      }
      const darker = `rgb(${Math.max(0,r-30)}, ${Math.max(0,g-30)}, ${Math.max(0,b-30)})`;
      document.documentElement.style.setProperty('--accent-glow', darker);
      localStorage.setItem('accentColor', color);
    }
    function shadeColor(color, percent) { /* keep simple */ return color; }

    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);
    const savedAccent = localStorage.getItem('accentColor') || '#3b82f6';
    setAccent(savedAccent);
    document.getElementById('accentColor').value = savedAccent;

    document.getElementById('lightTheme').addEventListener('click', () => setTheme('light'));
    document.getElementById('darkTheme').addEventListener('click', () => setTheme('dark'));
    document.getElementById('vibrantTheme').addEventListener('click', () => setTheme('vibrant'));
    document.getElementById('accentColor').addEventListener('input', (e) => setAccent(e.target.value));

    document.getElementById('searchInput').addEventListener('input', () => displayJobs());
    document.getElementById('locationFilter').addEventListener('change', () => displayJobs());

    document.getElementById('shareTwitter').addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://twitter.com/intent/tweet?text=Find IT fresher jobs in India! ${encodeURIComponent(window.location.href)}`, '_blank');
    });
    document.getElementById('shareLinkedin').addEventListener('click', (e) => {
      e.preventDefault();
      window.open(`https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(window.location.href)}&title=IT Fresher Jobs in India`, '_blank');
    });

    // Auto-refresh every 5 minutes (to catch new jobs without page reload)
    setInterval(() => {
      fetchJobs(true);
    }, 5 * 60 * 1000);

    fetchJobs();
  </script>
</body>
</html>
