<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ApplyMore | Premium IT Jobs</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.5);
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light {
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.8);
      --text: #1e293b;
      --text-muted: #64748b;
      --border: rgba(0, 0, 0, 0.1);
    }

    body.vibrant {
      --primary: #f43f5e;
      --primary-glow: rgba(244, 63, 94, 0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
      transition: background-color 0.4s ease;
    }

    /* === BACKGROUND ANIMATION === */
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; overflow: hidden;
    }
    .orb {
      position: absolute; width: 400px; height: 400px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      border-radius: 50%; filter: blur(60px);
      animation: move 20s infinite alternate;
      opacity: 0.4;
    }
    @keyframes move {
      0% { transform: translate(-10%, -10%) scale(1); }
      100% { transform: translate(100%, 50%) scale(1.2); }
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    /* === HEADER === */
    .navbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 2rem; background: var(--card-bg);
      backdrop-filter: blur(12px); border: 1px solid var(--border);
      border-radius: 20px; margin-bottom: 3rem;
      position: sticky; top: 1rem; z-index: 100;
    }
    .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; color: var(--primary); }

    .theme-controls { display: flex; gap: 0.8rem; align-items: center; }
    .theme-dot {
      width: 14px; height: 14px; border-radius: 50%; cursor: pointer;
      border: 2px solid var(--border); transition: var(--transition);
    }
    .theme-dot:hover { transform: scale(1.3); }

    /* === HERO === */
    .hero { text-align: center; margin-bottom: 4rem; }
    .hero h2 { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 800; margin-bottom: 1rem; }
    .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

    /* === UNIQUE SEARCH & CHIPS === */
    .search-wrapper {
      max-width: 800px; margin: 0 auto 3rem;
    }
    .search-bar {
      display: flex; align-items: center; background: var(--card-bg);
      border: 1px solid var(--border); border-radius: 100px;
      padding: 0.5rem 0.5rem 0.5rem 1.5rem; transition: var(--transition);
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
    }
    .search-bar:focus-within { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
    .search-bar input {
      flex: 1; background: transparent; border: none; color: var(--text);
      outline: none; font-size: 1rem; padding: 0.5rem;
    }
    .search-icon { color: var(--primary); font-size: 1.2rem; }

    /* Replace Dropdown with Horizontal Pills */
    .filter-pills {
      display: flex; gap: 0.8rem; overflow-x: auto; padding: 1rem 0;
      scrollbar-width: none; justify-content: center;
    }
    .filter-pills::-webkit-scrollbar { display: none; }
    .pill {
      white-space: nowrap; padding: 0.6rem 1.4rem; border-radius: 100px;
      background: var(--card-bg); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer; font-weight: 600;
      font-size: 0.85rem; transition: var(--transition);
    }
    .pill.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* === JOB GRID === */
    .jobs-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;
    }
    .job-card {
      background: var(--card-bg); border: 1px solid var(--border);
      padding: 1.8rem; border-radius: 24px; transition: var(--transition);
      position: relative; overflow: hidden; display: flex; flex-direction: column;
    }
    .job-card:hover {
      transform: translateY(-8px); border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
    }
    .company-name { font-weight: 700; color: var(--primary); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.5rem; }
    .job-title { font-size: 1.25rem; font-weight: 700; line-height: 1.3; margin-bottom: 1rem; }
    .job-meta { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .job-meta span { display: flex; align-items: center; gap: 0.4rem; }
    
    .apply-btn {
      margin-top: auto; padding: 0.8rem; border-radius: 14px;
      background: var(--primary); color: white; text-align: center;
      text-decoration: none; font-weight: 700; transition: var(--transition);
    }
    .apply-btn:hover { filter: brightness(1.2); letter-spacing: 1px; }

    /* === LOADING & EMPTY === */
    .loader { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--primary); }

    @media (max-width: 600px) {
      .navbar { padding: 1rem; margin-bottom: 2rem; }
      .filter-pills { justify-content: flex-start; padding-left: 1rem; }
      .hero h2 { font-size: 2rem; }
    }
  </style>
</head>
<body class="dark">
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb" style="animation-delay: -5s; right: 0; bottom: 0;"></div>
  </div>

  <div class="container">
    <nav class="navbar">
      <div class="logo">ApplyMore</div>
      <div class="theme-controls">
        <div class="theme-dot" id="lightTheme" style="background: #fff;" title="Light"></div>
        <div class="theme-dot" id="darkTheme" style="background: #111;" title="Dark"></div>
        <div class="theme-dot" id="vibrantTheme" style="background: #f43f5e;" title="Vibrant"></div>
        <input type="color" id="accentColor" value="#6366f1" style="width: 20px; height:20px; border:none; cursor:pointer;">
      </div>
    </nav>

    <header class="hero">
      <h2>Launch Your Future.</h2>
      <p>The smartest way for IT freshers to find their first role. Verified daily across India.</p>
    </header>

    <div class="search-wrapper">
      <div class="search-bar">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search roles, skills, or companies...">
      </div>
      <div class="filter-pills" id="locationContainer">
        <div class="pill active" data-loc="all">All Locations</div>
        <div class="pill" data-loc="Hyderabad">Hyderabad</div>
        <div class="pill" data-loc="Bangalore">Bangalore</div>
        <div class="pill" data-loc="Mumbai">Mumbai</div>
        <div class="pill" data-loc="Pune">Pune</div>
        <div class="pill" data-loc="Chennai">Chennai</div>
        <div class="pill" data-loc="Delhi">Delhi</div>
      </div>
    </div>

    <div id="jobsContainer" class="jobs-grid">
      <div class="loader">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
        <p style="margin-top: 1rem;">Fetching fresh opportunities...</p>
      </div>
    </div>

    <footer style="margin-top: 5rem; text-align: center; color: var(--text-muted); font-size: 0.9rem; padding-bottom: 2rem;">
      <p>© 2026 ApplyMore • Built for the next generation of engineers</p>
    </footer>
  </div>

  <script>
    const API_URL = 'https://job-api-xizv.onrender.com/api/jobs';
    let allJobs = [];
    let currentLoc = 'all';

    async function fetchJobs() {
      try {
        const res = await fetch(API_URL);
        allJobs = await res.json();
        displayJobs();
      } catch (err) {
        document.getElementById('jobsContainer').innerHTML = '<p style="grid-column:1/-1; text-align:center;">Network error. Please try again.</p>';
      }
    }

    function displayJobs() {
      const container = document.getElementById('jobsContainer');
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = allJobs;
      
      if (currentLoc !== 'all') {
        filtered = filtered.filter(j => j.location?.toLowerCase().includes(currentLoc.toLowerCase()));
      }
      if (searchTerm) {
        filtered = filtered.filter(j => 
          j.title.toLowerCase().includes(searchTerm) || 
          j.company.toLowerCase().includes(searchTerm)
        );
      }

      if (filtered.length === 0) {
        container.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding: 4rem;">No jobs matching your criteria.</p>';
        return;
      }

      container.innerHTML = filtered.map((job, i) => `
        <div class="job-card" style="animation: fadeInUp 0.5s ease forwards ${i * 0.05}s; opacity: 0;">
          <div class="company-name">${escapeHtml(job.company)}</div>
          <div class="job-title">${escapeHtml(job.title)}</div>
          <div class="job-meta">
            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'India')}</span>
            ${job.applicationDeadline ? `<span><i class="far fa-calendar-alt"></i> ${new Date(job.applicationDeadline).toLocaleDateString()}</span>` : ''}
          </div>
          <a href="${job.url}" target="_blank" class="apply-btn">Apply Direct</a>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      if(!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Interaction Logic
    document.querySelectorAll('.pill').forEach(pill => {
      pill.onclick = () => {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentLoc = pill.dataset.loc;
        displayJobs();
      };
    });

    document.getElementById('searchInput').oninput = displayJobs;

    // Theme Management
    function setTheme(t) {
      document.body.className = t;
      localStorage.setItem('theme', t);
    }
    
    document.getElementById('lightTheme').onclick = () => setTheme('light');
    document.getElementById('darkTheme').onclick = () => setTheme('dark');
    document.getElementById('vibrantTheme').onclick = () => setTheme('vibrant');
    document.getElementById('accentColor').oninput = (e) => {
      document.documentElement.style.setProperty('--primary', e.target.value);
      document.documentElement.style.setProperty('--primary-glow', e.target.value + '80');
    };

    // Load
    setTheme(localStorage.getItem('theme') || 'dark');
    fetchJobs();
  </script>

  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</body>
</html>
